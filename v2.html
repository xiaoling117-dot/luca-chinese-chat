<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>陸（ルー）｜中国語チャット</title>
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<style>
:root{
  --bg-top:#1a1530; --bg-bottom:#0d0a1c;
  --luca-bubble:#2a2342; --user-bubble:#6d5cc4;
  --accent:#b9a7ff; --heart:#ff8db5;
  --text:#efeaff; --sub:#a89fce; --line:rgba(255,255,255,.08);
  --luca-face:url("assets/images/luca-face-default.png");
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%; margin:0;}
body{min-height:100dvh; font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP","PingFang SC",sans-serif;
  background:#000; display:flex; justify-content:center; align-items:center; color:var(--text);}

.phone{width:100%; max-width:420px; height:100vh; height:100dvh; max-height:880px;
  background:linear-gradient(180deg, rgba(26,21,48,.50), rgba(13,10,28,.74)), url("assets/images/bg.jpg") center/cover;
  display:flex; flex-direction:column; position:relative; overflow:hidden;
  box-shadow:0 0 60px rgba(110,80,200,.25);}
@media(min-width:440px){ .phone{ border-radius:28px; height:92vh; height:92dvh; } }
.phone.liveroom{
  background:linear-gradient(180deg, rgba(10,6,28,.72), rgba(5,3,15,.90)),
    url("assets/images/bg.jpg") center/cover;
}

header{padding:14px 14px 12px; display:flex; align-items:center; gap:10px;
  background:rgba(20,16,40,.65); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line); z-index:5;}
.back{color:var(--sub); font-size:22px; text-decoration:none; line-height:1;}
.avatar{width:44px; height:44px; border-radius:50%; flex:none; position:relative;
  background:#1a1530; overflow:hidden; box-shadow:0 0 0 2px rgba(185,167,255,.45);}
.avatar::before{content:''; position:absolute; inset:-10%; background:var(--luca-face) center 15%/cover;}
.avatar .dot{position:absolute; right:-1px; bottom:-1px; width:11px; height:11px;
  border-radius:50%; background:#5ee08a; border:2px solid var(--bg-top);}
.htext{flex:1; min-width:0;}
.htext .name{font-weight:700; font-size:16px;}
.htext .status{font-size:11px; color:#5ee08a;}
.heart-pill{display:flex; align-items:center; gap:6px; padding:6px 10px;
  background:rgba(185,167,255,.12); border:1px solid rgba(185,167,255,.25);
  border-radius:20px; font-size:12px; white-space:nowrap;}
.heart-pill .hi{color:var(--heart); font-size:14px; transition:transform .25s;}
.heart-pill.bump .hi{transform:scale(1.5);}
.lovebar-wrap{height:4px; background:rgba(255,255,255,.06);}
.lovebar{height:100%; width:0%; background:linear-gradient(90deg,#8a72ff,var(--heart)); transition:width .6s ease;}

.chat{flex:1; overflow-y:auto; padding:16px 14px 8px; display:flex; flex-direction:column; gap:14px; position:relative;}
.chat::before{content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
  background:radial-gradient(120% 45% at 50% -8%, rgba(130,95,210,.22), transparent 60%),
  linear-gradient(180deg, rgba(20,14,40,.22) 0%, rgba(13,10,28,.46) 100%);}
.chat > *{position:relative; z-index:1;}
.chat::-webkit-scrollbar{width:0;}
.timestamp{text-align:center; font-size:11px; color:var(--sub); margin:2px 0;}
.daychip{align-self:center; font-size:11px; color:var(--accent);
  background:rgba(185,167,255,.10); border:1px solid rgba(185,167,255,.25);
  padding:3px 12px; border-radius:20px; margin:2px 0;}

.row{display:flex; gap:8px; align-items:flex-end; max-width:100%;}
.row.me{flex-direction:row-reverse;}
.row .mini{width:30px; height:30px; border-radius:50%; flex:none; position:relative;
  background:#1a1530; overflow:hidden; box-shadow:0 0 0 1px rgba(185,167,255,.3);}
.row .mini::before{content:''; position:absolute; inset:-10%; background:var(--luca-face) center 15%/cover;}
.bubble{width:fit-content; max-width:100%; padding:10px 13px; border-radius:16px; line-height:1.5;
  font-size:15px; position:relative; animation:pop .28s ease;}
@keyframes pop{from{opacity:0; transform:translateY(6px) scale(.97);} to{opacity:1; transform:none;}}
.bwrap{display:flex; flex-direction:column; max-width:74%; min-width:0;}
.row.me .bwrap{align-items:flex-end;}
.row.luca .bwrap{align-items:flex-start;}
.row.luca .bubble{background:var(--luca-bubble); border-top-left-radius:5px;}
.row.me .bubble{background:var(--user-bubble); border-top-right-radius:5px; color:#fff;}
.bubble .zh{font-size:16px; letter-spacing:.3px;}
.bubble.tappable{cursor:pointer;}
.bubble.tappable::after{content:"訳"; position:absolute; right:8px; bottom:6px; font-size:9px;
  color:var(--sub); border:1px solid var(--line); border-radius:6px; padding:0 4px; opacity:.7;}
.bubble.open.tappable::after{content:"✕";}
.trans{display:none; margin-top:7px; padding-top:7px; border-top:1px dashed var(--line); font-size:13px; color:var(--sub);}
.bubble.open .trans{display:block;}
.trans .py{color:var(--accent); font-size:12px; margin-bottom:2px;}
.zh .spk{margin-left:6px; vertical-align:middle; background:rgba(185,167,255,.18);
  border:1px solid rgba(185,167,255,.35); color:var(--accent); font-size:11px;
  font-family:inherit; padding:1px 7px; border-radius:8px; cursor:pointer; line-height:1.5;}
.zh .spk:active{transform:scale(.9);}
.zh .spk:disabled{cursor:not-allowed; opacity:.45; transform:none;}
.meta{font-size:10px; color:var(--sub); margin:0 2px;}

.typing .bubble{padding:13px 16px;}
.typing span{display:inline-block; width:7px; height:7px; margin:0 2px; border-radius:50%;
  background:var(--sub); animation:blink 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;} .typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,60%,100%{opacity:.3;} 30%{opacity:1;}}

.floatheart{position:absolute; right:70px; top:60px; color:var(--heart); font-weight:700;
  font-size:14px; pointer-events:none; animation:up 1s ease forwards; z-index:9;}
@keyframes up{from{opacity:0; transform:translateY(0);} 20%{opacity:1;} to{opacity:0; transform:translateY(-40px);}}

.dock{padding:10px 12px calc(14px + env(safe-area-inset-bottom)); background:rgba(15,11,30,.7);
  backdrop-filter:blur(8px); border-top:1px solid var(--line);}
.choices{display:flex; flex-direction:column; gap:8px; margin-bottom:10px;}
.choice-prompt{font-size:12px; color:var(--sub); text-align:center; padding:2px 4px 6px; opacity:.8;}
.choice{text-align:left; width:100%; padding:12px 14px; border-radius:14px; cursor:pointer;
  background:rgba(185,167,255,.10); border:1px solid rgba(185,167,255,.22);
  color:var(--text); font-size:15px; font-family:inherit; transition:background .15s, transform .1s;}
.choice:hover{background:rgba(185,167,255,.2);}
.choice:active{transform:scale(.98);}
.choice .cgloss{color:var(--sub); font-size:12px; margin-left:6px;}
.shortcut-bar{display:flex; gap:8px; padding:8px 14px 4px; justify-content:flex-start;
  overflow-x:auto; scrollbar-width:none;}
.shortcut-bar::-webkit-scrollbar{display:none;}
.sc-btn{display:flex; align-items:center; gap:6px; padding:8px 16px;
  background:rgba(185,167,255,.12); border:1px solid rgba(185,167,255,.25);
  border-radius:20px; color:var(--text); font-size:13px; cursor:pointer;
  white-space:nowrap; transition:background .15s;}
.sc-btn:active{background:rgba(185,167,255,.28);}
.sc-btn .sc-icon{font-size:16px;}
.inputbar{display:flex; align-items:center; gap:8px; opacity:.55;}
.inputbar .plus{width:30px; height:30px; border-radius:50%; border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center; color:var(--sub);}
.inputbar input{flex:1; background:rgba(255,255,255,.06); border:none; border-radius:18px;
  padding:9px 14px; color:var(--text); font-size:13px;}
.inputbar input::placeholder{color:var(--sub);}

/* パネル共通 */
.panel{position:absolute; inset:0; z-index:55; display:none; flex-direction:column;
  background:linear-gradient(180deg,rgba(22,16,46,.97),rgba(13,10,28,.99)); backdrop-filter:blur(6px);}
.panel.open{display:flex;}
.panel-hd{display:flex; align-items:center; justify-content:space-between;
  padding:calc(16px + env(safe-area-inset-top)) 18px 12px; border-bottom:1px solid var(--line);}
.panel-hd h2{font-size:16px; color:var(--text); margin:0;}
.panel-close{background:none; border:none; color:var(--sub); font-size:20px; cursor:pointer; padding:4px;}

/* プロフィールパネル */
.profile-content{flex:1; overflow-y:auto; padding:24px 20px calc(28px + env(safe-area-inset-bottom));}
.profile-face-wrap{width:140px; height:140px; border-radius:50%; margin:0 auto 20px;
  overflow:hidden; border:3px solid rgba(185,167,255,.45); box-shadow:0 0 32px rgba(185,167,255,.25);}
.profile-face{width:100%; height:100%; object-fit:cover; object-position:center 15%; display:block; transform:scale(1.1);}
.profile-card{background:rgba(20,16,40,.85); border:1px solid rgba(185,167,255,.2); border-radius:18px; padding:18px;}
.profile-name{font-size:22px; font-weight:700; color:var(--text); text-align:center; margin-bottom:18px;}
.profile-name span{display:block; margin-top:3px; font-size:12px; font-weight:400; color:var(--accent);}
.profile-row{display:grid; grid-template-columns:62px 1fr; gap:10px; padding:10px 0;
  border-top:1px solid rgba(185,167,255,.12); font-size:13px; line-height:1.6;}
.profile-label{color:var(--sub);}
.profile-value{color:var(--text);}
.profile-quote{margin-top:18px; padding:14px; border-radius:14px;
  background:rgba(185,167,255,.1); color:var(--text); text-align:center; font-size:14px;}
.profile-intimacy{margin-top:16px;}
.panel-progress-label{display:flex; justify-content:space-between; gap:12px;
  color:var(--sub); font-size:12px; margin-bottom:7px;}
.panel-progress{height:7px; border-radius:99px; overflow:hidden; background:rgba(255,255,255,.08);}
.panel-progress-fill{height:100%; width:0; border-radius:inherit;
  background:linear-gradient(90deg,#8a72ff,#ff8db5); transition:width .25s ease;}

/* ステータスパネル */
.status-content{flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:12px;
  padding:20px 20px calc(28px + env(safe-area-inset-bottom));}
.stat-row{background:rgba(20,16,40,.85); border:1px solid rgba(185,167,255,.2); border-radius:16px; padding:16px;}
.stat-heading{display:flex; align-items:center; justify-content:space-between; gap:12px;}
.stat-label{color:var(--sub); font-size:13px;}
.stat-value{color:var(--text); font-size:18px; font-weight:700;}
.stat-note{margin-top:6px; color:var(--sub); font-size:11px; line-height:1.5;}
header .avatar, header .htext{cursor:pointer;}

/* 単語帳パネル */
.fc-wrap{flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:24px 20px calc(24px + env(safe-area-inset-bottom)); gap:20px;}
.fc-card{width:100%; max-width:320px; min-height:180px; border-radius:20px;
  background:rgba(255,255,255,.06); border:1px solid rgba(185,167,255,.2);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:28px 20px; cursor:pointer; touch-action:manipulation; user-select:none;
  box-shadow:0 4px 24px rgba(0,0,0,.3);}
.fc-card:active{background:rgba(185,167,255,.10);}
.fc-zh{font-size:38px; color:var(--text); margin-bottom:8px; text-align:center;}
.fc-hint{font-size:12px; color:rgba(185,167,255,.4); margin-top:4px;}
.fc-back{display:none; text-align:center;}
.fc-back.show{display:block;}
.fc-py{font-size:14px; color:rgba(185,167,255,.8); margin-bottom:6px;}
.fc-ja{font-size:18px; color:var(--text);}
.fc-nav{display:flex; gap:16px; align-items:center;}
.fc-nav button{background:rgba(185,167,255,.15); border:1px solid rgba(185,167,255,.25);
  color:var(--text); border-radius:12px; padding:10px 22px; font-size:14px; cursor:pointer;}
.fc-nav button:active{background:rgba(185,167,255,.3);}
.fc-counter{font-size:13px; color:var(--sub);}
.fc-status{display:flex; gap:10px; margin-top:4px;}
.fc-return{background:linear-gradient(90deg,#8a72ff,#ff8db5); border:none; color:#fff;
  border-radius:14px; padding:12px 28px; font-size:14px; font-weight:700; cursor:pointer;}
.fc-ok{background:rgba(100,200,120,.18)!important; border-color:rgba(100,200,120,.4)!important; color:#7be08a!important;}
.fc-ng{background:rgba(220,100,100,.18)!important; border-color:rgba(220,100,100,.4)!important; color:#e07b7b!important;}

/* プレゼントパネル */
.gift-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:20px;}
.gift-item{background:rgba(255,255,255,.06); border:1px solid rgba(185,167,255,.2);
  border-radius:16px; padding:20px 12px; text-align:center; cursor:pointer; transition:transform .12s,background .12s;}
.gift-item:active{transform:scale(.95); background:rgba(185,167,255,.15);}
.gift-item.sent{opacity:.45; pointer-events:none;}
.gift-emoji{font-size:40px; margin-bottom:8px;}
.gift-name{font-size:13px; color:var(--text); margin-bottom:4px;}
.gift-name-zh{font-size:11px; color:var(--sub); margin-bottom:8px;}
.gift-love{font-size:12px; color:var(--heart); font-weight:600;}
.gift-limit{font-size:11px; color:var(--sub); margin-top:4px;}
.gift-info{padding:0 20px 16px; font-size:12px; color:var(--sub); text-align:center;}
.gift-toast{position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(255,141,181,.92); color:#fff; font-size:18px; font-weight:700;
  padding:14px 28px; border-radius:30px; z-index:80; pointer-events:none;
  animation:toastpop .25s ease, toastfade 1s ease .8s forwards;}
@keyframes toastpop{from{transform:translate(-50%,-50%) scale(.7);}to{transform:translate(-50%,-50%) scale(1);}}
@keyframes toastfade{to{opacity:0;}}
.floatgift{position:absolute; font-size:28px; pointer-events:none; z-index:60;
  animation:giftfly 1.4s ease-out forwards;}
@keyframes giftfly{0%{opacity:1;transform:translateY(0) scale(1);}60%{opacity:1;transform:translateY(-120px) scale(1.3);}100%{opacity:0;transform:translateY(-200px) scale(.8);}}

/* ボイスバブル */
.voice-bubble{background:rgba(255,255,255,.07); border:1px solid rgba(185,167,255,.2);
  border-radius:18px 18px 18px 4px; padding:10px 14px; min-width:180px; max-width:260px;}
.voice-play{display:flex; align-items:center; gap:10px;}
.voice-play-btn{width:34px; height:34px; border-radius:50%; background:rgba(185,167,255,.25);
  border:none; cursor:pointer; color:var(--text); font-size:14px; flex:none; transition:background .15s;}
.voice-play-btn:hover{background:rgba(185,167,255,.4);}
.voice-play-btn:disabled{cursor:not-allowed; opacity:.45;}
.voice-wave{flex:1; display:flex; align-items:center; gap:2px; height:20px;}
.voice-wave span{display:inline-block; width:3px; border-radius:2px; background:rgba(185,167,255,.55);
  animation:wavebar 1.1s ease-in-out infinite;}
.voice-wave span:nth-child(1){height:5px; animation-delay:0s;}
.voice-wave span:nth-child(2){height:12px; animation-delay:.1s;}
.voice-wave span:nth-child(3){height:18px; animation-delay:.2s;}
.voice-wave span:nth-child(4){height:10px; animation-delay:.3s;}
.voice-wave span:nth-child(5){height:16px; animation-delay:.4s;}
.voice-wave span:nth-child(6){height:8px; animation-delay:.5s;}
.voice-wave span:nth-child(7){height:14px; animation-delay:.35s;}
.voice-wave span:nth-child(8){height:6px; animation-delay:.25s;}
.voice-wave span:nth-child(9){height:12px; animation-delay:.15s;}
@keyframes wavebar{0%,100%{opacity:.4;transform:scaleY(.7);}50%{opacity:1;transform:scaleY(1);}}
.voice-wave.playing span{background:rgba(255,141,181,.8);}
.voice-sec{font-size:12px; color:var(--sub); flex:none;}
.voice-ten-btn{margin-top:8px; font-size:11px; color:rgba(185,167,255,.7);
  background:none; border:none; cursor:pointer; padding:0; display:block;}
.voice-ten-btn:hover{color:var(--text);}
.voice-text{display:none; margin-top:10px; border-top:1px solid rgba(255,255,255,.08); padding-top:8px;}
.voice-text.open{display:block;}
.voice-text .zh{font-size:16px; color:var(--text); margin-bottom:4px;}
.voice-text .py{font-size:11px; color:rgba(185,167,255,.7); margin-bottom:2px;}
.voice-text .ja{font-size:12px; color:var(--sub);}

/* LvUP演出 */
.lvlup{position:absolute; inset:0; z-index:60; display:none; flex-direction:column;
  align-items:center; justify-content:center; background:rgba(8,6,18,.55); backdrop-filter:blur(3px);}
.lvlup.show{display:flex; animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;} to{opacity:1;}}
#lvlupImg{width:184px; height:184px; border-radius:50%; position:relative;
  background:#1a1530; overflow:hidden;
  box-shadow:0 0 0 3px rgba(255,141,181,.6), 0 0 50px rgba(255,141,181,.45);
  animation:popface .5s cubic-bezier(.2,1.3,.4,1);}
#lvlupImg::before{content:''; position:absolute; inset:-10%; background:var(--luca-face) center 15%/cover;}
@keyframes popface{from{transform:scale(.5); opacity:0;} to{transform:scale(1); opacity:1;}}
.lvlup .ttl{margin-top:18px; font-size:13px; color:var(--heart); letter-spacing:1px;}
.lvlup .big{margin-top:4px; font-size:22px; font-weight:700; color:var(--text);}

/* 通話オーバーレイ */
.callbtn{flex:none; width:34px; height:34px; border-radius:50%; margin-right:8px; cursor:pointer;
  background:rgba(94,224,138,.14); border:1px solid rgba(94,224,138,.4); color:#5ee08a; font-size:15px;
  display:flex; align-items:center; justify-content:center;}
.callbtn:active{transform:scale(.94);}
.calloverlay{position:absolute; inset:0; z-index:50; display:none; flex-direction:column; align-items:center;
  padding:calc(54px + env(safe-area-inset-top)) 24px calc(112px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg,#271d4a 0%,#0c0a1b 100%); text-align:center; overflow-y:auto;}
.calloverlay.show{display:flex;}
.callface{width:140px; height:140px; border-radius:50%; margin-top:24px; position:relative;
  background:#1a1530; overflow:hidden;
  box-shadow:0 0 0 3px rgba(185,167,255,.45), 0 0 44px rgba(150,110,230,.45);}
.callface::before{content:''; position:absolute; inset:-10%; background:url("assets/images/luca-face-call.png") center 12%/cover;}
.callface.ring{animation:ring 1.2s ease-in-out infinite;}
@keyframes ring{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.callname{margin-top:18px; font-size:22px; font-weight:700;}
.callstatus{margin-top:6px; color:var(--sub); font-size:14px;}
.callsub{display:none; margin-top:26px; max-width:330px;}
.callsub.show{display:block;}
.cs-zh{font-size:23px; line-height:1.5;}
.cs-py{color:var(--accent); font-size:13px; margin-top:6px;}
.cs-ja{color:var(--sub); font-size:14px; margin-top:4px;}
.cs-row{margin-top:16px; display:flex; gap:10px; justify-content:center;}
.cs-row button{padding:9px 16px; border-radius:14px; font-family:inherit; font-size:13px; cursor:pointer;
  border:1px solid rgba(185,167,255,.3); background:rgba(185,167,255,.14); color:var(--text);}
.callbtns{position:absolute; bottom:calc(46px + env(safe-area-inset-bottom)); left:0; right:0; display:flex; justify-content:center; gap:46px;}
.cb{min-width:104px; padding:14px 18px; border-radius:30px; border:none; color:#fff;
  font-family:inherit; font-size:15px; font-weight:700; cursor:pointer;}
.cb.accept{background:#36c26b;} .cb.decline{background:#e2575c;} .cb.hang{background:#e2575c;}
.cb:active{transform:scale(.96);}

/* +メニュー */
.plus-menu{position:absolute; bottom:70px; left:8px; background:rgba(24,18,50,.97);
  border:1px solid rgba(185,167,255,.2); border-radius:16px; padding:10px 6px;
  display:none; flex-direction:column; gap:4px; z-index:50; min-width:130px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);}
.plus-menu.open{display:flex;}
.pmenu-btn{display:flex; align-items:center; gap:10px; padding:10px 14px;
  border:none; background:none; color:var(--text); font-size:14px; cursor:pointer;
  border-radius:10px; text-align:left; width:100%;}
.pmenu-btn:hover{background:rgba(185,167,255,.12);}
.pmenu-icon{font-size:20px; width:24px; text-align:center;}

/* ===== v2 新規スタイル ===== */

/* ナレーションカード */
.narration-card{
  align-self:stretch; padding:14px 16px 10px;
  background:rgba(185,167,255,.05); border-left:2px solid rgba(185,167,255,.35);
  border-radius:0 12px 12px 0; cursor:pointer; animation:pop .3s ease;
}
.narration-text{
  font-size:13.5px; color:rgba(180,170,220,.85); line-height:1.85;
  white-space:pre-line; font-style:italic;
}
.narration-tap{
  text-align:right; font-size:10px; color:rgba(185,167,255,.3); margin-top:6px;
  animation:pulse 1.6s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.3;} 50%{opacity:.9;}}

/* ヒントツールチップ（画面固定） */
.hint-toast{
  position:absolute; bottom:calc(140px + env(safe-area-inset-bottom)); left:50%;
  transform:translateX(-50%); background:rgba(185,167,255,.96); color:#1a1530;
  font-size:12px; font-weight:700; padding:8px 16px; border-radius:20px;
  white-space:nowrap; z-index:45; pointer-events:none;
  animation:hintpop .3s ease, hintfade .4s ease 4s forwards;
}
@keyframes hintpop{from{opacity:0;transform:translateX(-50%) translateY(6px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes hintfade{to{opacity:0;}}

/* 暗転オーバーレイ */
.blackout-overlay{
  position:absolute; inset:0; z-index:70; background:#000;
  opacity:0; pointer-events:none; transition:opacity .6s ease;
}

.endcard{

.endcard p{font-size:13px; color:var(--sub); margin:0 0 16px; line-height:1.7;}
.endcard .next-btn{
  width:100%; padding:12px; border-radius:14px; border:none; cursor:pointer;
  background:linear-gradient(90deg,#8a72ff,#ff8db5); color:#fff;
  font-family:inherit; font-size:15px; font-weight:700;
}
</style>

<script>
'use strict';
/* ============================================================
   v2 エピソードエンジン
   data/{id}.json を fetch → steps[] を順処理
   step types: scene / narration / line / voice / pause / effect / choice / end
   ============================================================ */

// --- DOM -------------------------------------------------------
const chat      = document.getElementById('chat');
const choicesEl = document.getElementById('choices');
const lovebar   = document.getElementById('lovebar');
const heartLabel= document.getElementById('heartLabel');
const blackoutEl= document.getElementById('blackout');
const phoneEl   = document.getElementById('phone');

// --- 状態 -------------------------------------------------------
let steps     = [];
let epId      = 'prologue';
let epTitle   = '';
let idx       = 0;
let love      = 0;
let awarded   = new Set();
let hintsSeen = new Set();
let allVocab  = [];  // {zh, pinyin, ja}[]

// --- 永続化 -------------------------------------------------------
function save(){
  try{
    localStorage.setItem('luca_v2', JSON.stringify({
      epId, idx, love,
      awarded: [...awarded],
      hintsSeen: [...hintsSeen]
    }));
  }catch(e){}
}
function loadState(){
  try{
    const d = JSON.parse(localStorage.getItem('luca_v2') || 'null');
    if(d){
      epId      = d.epId      || 'prologue';
      idx       = d.idx       || 0;
      love      = d.love      || 0;
      awarded   = new Set(d.awarded   || []);
      hintsSeen = new Set(d.hintsSeen || []);
    }
  }catch(e){}
}

// --- エピソード読み込み -------------------------------------------------------
async function fetchEpisode(id){
  const r = await fetch('data/' + id + '.json');
  if(!r.ok) throw new Error('Episode not found: ' + id);
  const data = await r.json();
  steps   = data.steps;
  epTitle = data.title || id;
  // 単語帳用に全zhラインを収集
  data.steps.forEach(s => {
    if(s.type === 'line' && s.lang === 'zh' && s.zh && s.pinyin && s.ja){
      if(!allVocab.find(v => v.zh === s.zh))
        allVocab.push({ zh: s.zh, pinyin: s.pinyin, ja: s.ja });
    }
  });
  return data;
}

// --- 親密度 / レベル -------------------------------------------------------
const LUCA_FACES = [
  'assets/images/luca-face-0.png', 'assets/images/luca-face-1.png',
  'assets/images/luca-face-2.png', 'assets/images/luca-face-3.png',
  'assets/images/luca-face-4.png', 'assets/images/luca-face-5.png'
];
const PROFILE_QUOTES = [
  '「…誰？」', '「まあ、悪くない。」', '「最近、お前のこと考える。」',
  '「連絡してくれると、ちょっと嬉しい。」', '「そばにいると、落ち着く。」',
  '「お前が好きだ。ずっとそう思ってた。」'
];
function currentLevel(){ return Math.min(6, Math.floor(Math.min(Math.max(love,0),100)/17)+1); }

function updateLove(bump){
  const pct = Math.min(love, 100);
  const lv  = currentLevel();
  lovebar.style.width    = pct + '%';
  heartLabel.textContent = 'Lv.' + lv + ' ' + pct + '%';
  if(bump){
    const pill = document.getElementById('heartPill');
    pill.classList.add('bump');
    setTimeout(() => pill.classList.remove('bump'), 300);
    const h = document.createElement('div');
    h.className   = 'floatheart';
    h.textContent = '+♥';
    phoneEl.appendChild(h);
    setTimeout(() => h.remove(), 1000);
    // レベルアップ判定
    const prevLv = Math.min(6, Math.floor(Math.min(Math.max(love-5,0),100)/17)+1);
    if(lv > prevLv) showLevelUp(lv);
  }
}

function showLevelUp(lv){
  phoneEl.style.setProperty('--luca-face', 'url("' + LUCA_FACES[Math.min(lv-1,5)] + '")');
  document.getElementById('lvlupBig').textContent = 'Lv.' + lv;
  const el = document.getElementById('lvlup');
  el.classList.add('show');
  el.addEventListener('click', () => el.classList.remove('show'), { once: true });
}

// --- 汎用ユーティリティ -------------------------------------------------------
const sleep  = ms => new Promise(r => setTimeout(r, ms));
const scrollDown = () => { chat.scrollTop = chat.scrollHeight; };

function addTimestamp(t){
  const d = document.createElement('div');
  d.className   = 'timestamp';
  d.textContent = t;
  chat.appendChild(d); scrollDown();
}
function addDaychip(label){
  const d = document.createElement('div');
  d.className   = 'daychip';
  d.textContent = label;
  chat.appendChild(d); scrollDown();
}

function showTyping(ms){
  const row   = document.createElement('div'); row.className   = 'row luca typing';
  const mini  = document.createElement('div'); mini.className  = 'mini';
  const bwrap = document.createElement('div'); bwrap.className = 'bwrap';
  const bbl   = document.createElement('div'); bbl.className   = 'bubble';
  bbl.innerHTML = '<span></span><span></span><span></span>';
  bwrap.appendChild(bbl); row.appendChild(mini); row.appendChild(bwrap);
  chat.appendChild(row); scrollDown();
  return new Promise(r => setTimeout(() => { row.remove(); r(); }, ms));
}

// --- TTS -------------------------------------------------------
let zhVoice = null;
let speechSupported = ('speechSynthesis' in window);
let _reqId = 0;

(function initTTS(){
  if(!speechSupported) return;
  function pickVoice(){
    const voices = speechSynthesis.getVoices();
    zhVoice = voices.find(v => /zh.*CN|zh.*Hans|cmn/i.test(v.lang))
           || voices.find(v => /zh/i.test(v.lang));
  }
  speechSynthesis.addEventListener('voiceschanged', pickVoice);
  pickVoice();
  setTimeout(pickVoice, 2000);
})();

function speak(text){
  if(!speechSupported) return;
  const id = ++_reqId;
  speechSynthesis.cancel();
  setTimeout(() => {
    if(id !== _reqId) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = .85; u.pitch = 1;
    if(zhVoice) u.voice = zhVoice;
    speechSynthesis.speak(u);
  }, 60);
}

function makeSpeakBtn(zh){
  const btn = document.createElement('button');
  btn.className = 'spk';
  btn.textContent = '🔊';
  if(!speechSupported) btn.disabled = true;
  btn.addEventListener('click', e => { e.stopPropagation(); speak(zh); });
  return btn;
}

// --- ヒントシステム -------------------------------------------------------
function showHint(hint){
  if(!hint || !hint.id) return;
  if(hint.showOnce && hintsSeen.has(hint.id)) return;
  if(hint.showOnce){ hintsSeen.add(hint.id); save(); }
  const tip = document.createElement('div');
  tip.className = 'hint-toast';
  tip.textContent = (hint.icon === 'speaker' ? '🔊 ' : '👆 ') + hint.text;
  phoneEl.appendChild(tip);
  setTimeout(() => tip.remove(), 4500);
}

// --- バブル生成 -------------------------------------------------------
function buildLineBubble(step){
  const isLuca = step.speaker === '陸';
  const isUser = step.speaker === '主人公';
  const isNpc  = !isLuca && !isUser;

  const row   = document.createElement('div');
  const bwrap = document.createElement('div'); bwrap.className = 'bwrap';

  if(isUser){
    row.className = 'row me';
  } else {
    row.className = isNpc ? 'row luca npc' : 'row luca';
    const mini = document.createElement('div'); mini.className = 'mini';
    row.appendChild(mini);
  }

  if(isNpc){
    const nameEl = document.createElement('div');
    nameEl.className   = 'npc-name';
    nameEl.textContent = step.speaker;
    bwrap.appendChild(nameEl);
  }

  const bubble = document.createElement('div');

  if(step.lang === 'zh' && step.zh){
    bubble.className = 'bubble tappable';
    const zhSpan = document.createElement('span'); zhSpan.className = 'zh';
    zhSpan.textContent = step.zh;
    const spkBtn = makeSpeakBtn(step.zh);
    zhSpan.appendChild(spkBtn);
    bubble.appendChild(zhSpan);
    const trans = document.createElement('div'); trans.className = 'trans';
    trans.innerHTML = '<div class="py">' + (step.pinyin||'') + '</div>'
                    + (step.ja || '');
    bubble.appendChild(trans);
    bubble.addEventListener('click', () => bubble.classList.toggle('open'));
  } else {
    bubble.className  = 'bubble';
    bubble.textContent = step.ja || step.zh || '';
  }

  bwrap.appendChild(bubble);
  row.appendChild(bwrap);
  return row;
}

function addLine(step){
  const row = buildLineBubble(step);
  chat.appendChild(row); scrollDown();
  if(step.hint) showHint(step.hint);
}

function addUserSend(send){
  addLine({ speaker: '主人公', lang: 'zh', zh: send.zh, pinyin: send.pinyin, ja: send.ja });
}

// ナレーションカード（タップで続行）
function addNarration(text){
  return new Promise(resolve => {
    const card = document.createElement('div'); card.className = 'narration-card';
    const txt  = document.createElement('div'); txt.className  = 'narration-text';
    txt.textContent = text;
    const tap  = document.createElement('div'); tap.className  = 'narration-tap';
    tap.textContent = 'タップして続ける ▾';
    card.appendChild(txt); card.appendChild(tap);
    chat.appendChild(card); scrollDown();
    card.addEventListener('click', () => { tap.remove(); resolve(); }, { once: true });
  });
}

// ボイスバブル
function addVoiceBubble(step){
  const row   = document.createElement('div'); row.className   = 'row luca';
  const mini  = document.createElement('div'); mini.className  = 'mini';
  const bwrap = document.createElement('div'); bwrap.className = 'bwrap';
  const vb    = document.createElement('div'); vb.className    = 'voice-bubble';

  const playRow = document.createElement('div'); playRow.className = 'voice-play';
  const playBtn = document.createElement('button'); playBtn.className = 'voice-play-btn';
  playBtn.textContent = '▶';
  if(!speechSupported) playBtn.disabled = true;

  const wave = document.createElement('div'); wave.className = 'voice-wave';
  for(let i = 0; i < 9; i++) wave.appendChild(document.createElement('span'));

  const sec = document.createElement('span'); sec.className = 'voice-sec';
  sec.textContent = (step.seconds || 1) + '″';

  playRow.appendChild(playBtn); playRow.appendChild(wave); playRow.appendChild(sec);
  vb.appendChild(playRow);

  let playing = false;
  const dur = (step.seconds || 1) * 1000 + 700;
  playBtn.addEventListener('click', e => {
    e.stopPropagation();
    if(playing){
      speechSynthesis.cancel(); wave.classList.remove('playing');
      playing = false; playBtn.textContent = '▶'; return;
    }
    speak(step.zh);
    wave.classList.add('playing'); playing = true; playBtn.textContent = '⏸';
    setTimeout(() => { wave.classList.remove('playing'); playing = false; playBtn.textContent = '▶'; }, dur);
  });

  if(step.transcript){
    const tenBtn = document.createElement('button'); tenBtn.className = 'voice-ten-btn';
    tenBtn.textContent = '転文字';
    const vtext = document.createElement('div'); vtext.className = 'voice-text';
    vtext.innerHTML = '<div class="zh">' + step.zh + '</div>'
                    + '<div class="py">' + (step.pinyin||'') + '</div>'
                    + '<div class="ja">' + (step.ja||'') + '</div>';
    let open = false;
    tenBtn.addEventListener('click', () => {
      open = !open;
      vtext.classList.toggle('open', open);
      tenBtn.textContent = open ? '收起文字' : '転文字';
    });
    vb.appendChild(tenBtn); vb.appendChild(vtext);
  }

  if(step.hint) showHint(step.hint);

  bwrap.appendChild(vb); row.appendChild(mini); row.appendChild(bwrap);
  chat.appendChild(row); scrollDown();
}

// --- エフェクト -------------------------------------------------------
async function doHesitation(){
  await showTyping(600);
  await sleep(300);
  await showTyping(600);
}

async function doBlackout(){
  blackoutEl.classList.add('visible');
  await sleep(900);
  blackoutEl.classList.remove('visible');
  await sleep(600);
}

// --- ステップディスパッチ -------------------------------------------------------
async function handleStep(step){
  switch(step.type){
    case 'scene':
      handleScene(step);
      break;
    case 'narration':
      await addNarration(step.text);
      await sleep(300);
      break;
    case 'line':
      await handleLine(step);
      break;
    case 'voice':
      await showTyping(700);
      addVoiceBubble(step);
      await sleep(400);
      break;
    case 'pause':
      await sleep(step.ms || 0);
      break;
    case 'effect':
      await handleEffect(step);
      break;
    // choice / end はメインループで処理
  }
}

function handleScene(step){
  if(step.location === 'liveroom'){
    phoneEl.classList.add('liveroom');
    document.getElementById('headerStatus').textContent = '🔴 LIVE';
  } else {
    phoneEl.classList.remove('liveroom');
    document.getElementById('headerStatus').textContent = '● オンライン';
  }
  if(step.time) addTimestamp(step.time);
}

async function handleLine(step){
  if(step.speaker === '陸'){
    await showTyping(600 + (step.zh || '').length * 35);
    addLine(step);
    await sleep(380);
  } else if(step.speaker !== '主人公'){
    // NPC
    await showTyping(450);
    addLine(step);
    await sleep(300);
  } else {
    addLine(step);
    await sleep(280);
  }
}

async function handleEffect(step){
  if(step.name === 'hesitation') await doHesitation();
  else if(step.name === 'blackout') await doBlackout();
  else if(step.name === 'datestamp') addDaychip(step.note || '— · —');
}

// --- 選択肢 -------------------------------------------------------
function renderChoices(options, prompt, onSelect){
  choicesEl.innerHTML = '';
  if(prompt){
    const p = document.createElement('div');
    p.className   = 'choice-prompt';
    p.textContent = prompt;
    choicesEl.appendChild(p);
  }
  options.forEach(opt => {
    const btn = document.createElement('button'); btn.className = 'choice';
    if(opt.send){
      const gloss = document.createElement('span'); gloss.className = 'cgloss';
      gloss.textContent = opt.send.ja;
      btn.textContent = opt.send.zh;
      btn.appendChild(gloss);
    } else {
      btn.textContent = opt.zh || '';
    }
    btn.addEventListener('click', () => {
      choicesEl.innerHTML = '';
      onSelect(opt);
    });
    choicesEl.appendChild(btn);
  });
}

async function handleChoice(step){
  return new Promise(resolve => {
    renderChoices(step.options, step.prompt, async opt => {
      if(opt.send) addUserSend(opt.send);
      if(opt.love){ love = Math.min(100, love + opt.love); updateLove(true); save(); }
      for(const rs of (opt.reply || [])) await handleStep(rs);
      resolve();
    });
  });
}

// --- エピソード終了 -------------------------------------------------------
async function handleEnd(step){
  const next = step.next;
  if(!next || next === 'main'){
    showEndCard(next);
    return;
  }
  // 次エピソードへ
  epId = next; idx = 0; save();
  chat.innerHTML = '';
  await fetchEpisode(next);
  updateStatusPanel();
  await runEngine();
}

function showEndCard(next){
  const card = document.createElement('div'); card.className = 'endcard';
  if(next === 'main'){
    card.innerHTML = '<h3>プロローグ 完了</h3>'
      + '<p>こうして、毎晩の"練習"が始まった。<br>——まだ、ただの練習だったころの話。</p>'
      + '<button class="next-btn" id="toMain">本編へ（v1）→</button>';
    card.querySelector('#toMain').addEventListener('click',
      () => { window.location = 'index.html'; });
  } else {
    card.innerHTML = '<h3>— つづく —</h3><p>次回もお楽しみに。</p>';
  }
  chat.appendChild(card); scrollDown();
}

// --- メインループ -------------------------------------------------------
async function runEngine(){
  while(idx < steps.length){
    const step = steps[idx];

    if(step.type === 'end'){
      idx++; save();
      await handleEnd(step);
      return;
    }
    if(step.type === 'choice'){
      await handleChoice(step);
      idx++; save();
      continue;
    }

    await handleStep(step);
    idx++; save();
  }
}

  document.getElementById('statusEp').textContent   = epTitle || epId;
  document.getElementById('statusWords').textContent = allVocab.length + '語';
}

// --- プロフィールパネル -------------------------------------------------------
function closeOtherPanels(exceptId){
  document.querySelectorAll('.panel.open').forEach(p => {
    if(p.id !== exceptId) p.classList.remove('open');
  });

}
function openProfile(){
  const panel = document.getElementById('profilePanel');
  if(panel.classList.contains('open')){ panel.classList.remove('open'); return; }
  const pct = Math.min(Math.max(love,0),100);
  const lv  = currentLevel();
  document.getElementById('profileFace').src            = LUCA_FACES[lv-1];
  document.getElementById('profileQuote').textContent   = PROFILE_QUOTES[lv-1];
  document.getElementById('profileLevel').textContent   = 'Lv.' + lv;
  document.getElementById('profileLove').textContent    = pct + '%';
  document.getElementById('profileProgress').style.width = pct + '%';
  closeOtherPanels('profilePanel'); panel.classList.add('open');
}
function openStatus(){
  const pct = Math.min(Math.max(love,0),100);
  const lv  = currentLevel();
  document.getElementById('statusLevel').textContent     = 'Lv.' + lv + ' / 6';
  document.getElementById('statusLove').textContent      = pct + '%';
  document.getElementById('statusProgress').style.width  = pct + '%';
  updateStatusPanel();
  closeOtherPanels('statusPanel');
  document.getElementById('statusPanel').classList.add('open');
}

document.getElementById('headerAvatar').addEventListener('click', openProfile);
document.getElementById('headerText').addEventListener('click', openProfile);

document.getElementById('statusClose').addEventListener('click',

// --- 単語帳パネル -------------------------------------------------------
(function(){
  let ci = 0, flipped = false;
  function showCard(){
    if(!allVocab.length){
      document.getElementById('fcZh').textContent = '—';
      document.getElementById('fcCounter').textContent = '0/0';
      return;
    }
    const w = allVocab[ci];
    document.getElementById('fcZh').textContent      = w.zh;
    document.getElementById('fcPy').textContent      = w.pinyin;
    document.getElementById('fcJa').textContent      = w.ja;
    document.getElementById('fcCounter').textContent = (ci+1) + '/' + allVocab.length;
    flipped = false;
    document.getElementById('fcBack').classList.remove('show');
    document.querySelector('.fc-hint').style.display = '';
    document.getElementById('fcOk').style.display    = 'none';
    document.getElementById('fcNg').style.display    = 'none';
  }
  document.getElementById('fcCard').addEventListener('click', () => {
    if(flipped) return; flipped = true;
    document.getElementById('fcBack').classList.add('show');
    document.querySelector('.fc-hint').style.display = 'none';
    document.getElementById('fcOk').style.display    = '';
    document.getElementById('fcNg').style.display    = '';
  });
  const nav = n => { ci = (ci + n + Math.max(allVocab.length,1)) % Math.max(allVocab.length,1); showCard(); };
  document.getElementById('fcNext').addEventListener('click', () => nav(1));
  document.getElementById('fcPrev').addEventListener('click', () => nav(-1));
  document.getElementById('fcOk').addEventListener('click',  () => nav(1));
  document.getElementById('fcNg').addEventListener('click',  () => showCard());

  function openVocab(){
    closeOtherPanels('vocabPanel'); showCard();
    document.getElementById('vocabPanel').classList.add('open');
  }
  const closeVocab = () => document.getElementById('vocabPanel').classList.remove('open');
  document.getElementById('openVocab').addEventListener('click',
    () => { document.getElementById('plusMenu').classList.remove('open'); openVocab(); });
  document.getElementById('scVocab').addEventListener('click',   openVocab);
  document.getElementById('vocabClose').addEventListener('click', closeVocab);
  document.getElementById('vocabReturn').addEventListener('click', closeVocab);
})();

// --- プレゼントパネル -------------------------------------------------------
(function(){
  const GIFTS = [
    { emoji:'🌸', name:'花束',  zh:'花束 huāshù',  love:8,  daily:3 },
    { emoji:'☕', name:'咖啡',  zh:'咖啡 kāfēi',   love:5,  daily:5 },
    { emoji:'🍰', name:'蛋糕',  zh:'蛋糕 dàngāo',  love:12, daily:2 },
    { emoji:'💎', name:'钻石',  zh:'钻石 zuànshí', love:25, daily:1 },
  ];
  const todayKey = 'gift_' + new Date().toISOString().slice(0,10);
  let sent = {};
  try{ sent = JSON.parse(localStorage.getItem(todayKey) || '{}'); }catch(e){}
  const saveSent = () => { try{ localStorage.setItem(todayKey, JSON.stringify(sent)); }catch(e){} };

  function buildGrid(){
    const grid = document.getElementById('giftGrid'); grid.innerHTML = '';
    GIFTS.forEach((g, i) => {
      const used = sent[i] || 0;
      const el = document.createElement('div');
      el.className = 'gift-item' + (used >= g.daily ? ' sent' : '');
      el.innerHTML = '<div class="gift-emoji">' + g.emoji + '</div>'
        + '<div class="gift-name">' + g.name + '</div>'
        + '<div class="gift-name-zh">' + g.zh + '</div>'
        + '<div class="gift-love">+' + g.love + ' 親密度</div>'
        + '<div class="gift-limit">残り' + (g.daily - used) + '回/日</div>';
      el.addEventListener('click', () => {
        if(used >= g.daily) return;
        sent[i] = (sent[i] || 0) + 1; saveSent();
        love = Math.min(100, love + g.love); updateLove(true); save();
        const f = document.createElement('div'); f.className = 'floatgift'; f.textContent = g.emoji;
        f.style.cssText = 'left:' + Math.random()*60 + '%;bottom:200px;';
        phoneEl.appendChild(f); setTimeout(() => f.remove(), 1400);
        const t = document.createElement('div'); t.className = 'gift-toast';
        t.textContent = g.emoji + ' +' + g.love + ' 親密度 ♥';
        phoneEl.appendChild(t); setTimeout(() => t.remove(), 1800);
        buildGrid();
      });
      grid.appendChild(el);
    });
  }
  function openGift(){
    closeOtherPanels('giftPanel'); buildGrid();
    document.getElementById('giftPanel').classList.add('open');
  }
  document.getElementById('openGift').addEventListener('click',
    () => { document.getElementById('plusMenu').classList.remove('open'); openGift(); });
  document.getElementById('scGift').addEventListener('click', openGift);
  document.getElementById('giftClose').addEventListener('click',
    () => document.getElementById('giftPanel').classList.remove('open'));
})();

// --- 通話 -------------------------------------------------------
const CALL = [
  { zh:'喂？……是我。',             ja:'もしもし？……俺だ。',         py:'wéi? … shì wǒ.' },
  { zh:'我就想听听你的声音。',       ja:'ただ、君の声が聞きたかった。', py:'wǒ jiù xiǎng tīngting nǐ de shēngyīn.' },
  { zh:'……怎么不说话。',            ja:'……なんで黙ってるんだ。',       py:'… zěnme bù shuōhuà.' },
  { zh:'算了。听我说就行。',         ja:'まあいい。俺の声、聞いてればいい。', py:'suàn le. tīng wǒ shuō jiù xíng.' },
  { zh:'今天也辛苦了。',             ja:'今日もお疲れさま。',           py:'jīntiān yě xīnkǔ le.' },
  { zh:'早点睡。……晚安。',          ja:'早く寝ろよ。……おやすみ。',     py:'zǎodiǎn shuì. … wǎn\'ān.' }
];
let callIdx = 0, callTimer = null, callSec = 0, callAccepted = false;
const $id = x => document.getElementById(x);
const fmtSec = s => { const m=Math.floor(s/60),ss=s%60; return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss; };

function openCall(){
  callIdx = 0; callSec = 0; callAccepted = false;
  $id('callStatus').textContent = '着信中…';
  $id('callFace').classList.add('ring');
  $id('callSub').classList.remove('show');
  $id('callIncoming').style.display = 'flex';
  $id('callHang').style.display     = 'none';
  $id('callOverlay').classList.add('show');
}
function acceptCall(){
  callAccepted = true;
  $id('callFace').classList.remove('ring');
  $id('callIncoming').style.display = 'none';
  $id('callHang').style.display     = 'flex';
  $id('callSub').classList.add('show');
  callSec = 0; $id('callStatus').textContent = '通話中 00:00';
  callTimer = setInterval(() => { callSec++; $id('callStatus').textContent = '通話中 ' + fmtSec(callSec); }, 1000);
  showCallLine();
}
function showCallLine(){
  const line = CALL[callIdx];
  $id('csZh').textContent = line.zh;
  $id('csPy').textContent = line.py;
  $id('csJa').textContent = line.ja;
  speak(line.zh);
  $id('csNext').textContent = callIdx >= CALL.length-1 ? '通話を終わる' : '次へ ›';
}
function nextCallLine(){ if(callIdx >= CALL.length-1){ hangUp(); return; } callIdx++; showCallLine(); }
function hangUp(){
  if(callTimer){ clearInterval(callTimer); callTimer = null; }
  try{ speechSynthesis.cancel(); }catch(e){}
  $id('callOverlay').classList.remove('show');
  if(callAccepted && !awarded.has('call')){
    awarded.add('call'); love = Math.min(100, love+8); updateLove(true); save();
  }
  callAccepted = false;
}
$id('csReplay').addEventListener('click', () => speak(CALL[callIdx].zh));
$id('csNext').addEventListener('click', nextCallLine);
if(!speechSupported) $id('csReplay').disabled = true;

// --- 起動 -------------------------------------------------------
async function boot(){
  loadState();
  updateLove(false);
  try{
    await fetchEpisode(epId);
  }catch(e){
    epId = 'prologue'; idx = 0;
    await fetchEpisode('prologue');
  }
  idx = 0; save();   // 常にエピソード先頭から（再開は今後）
  updateStatusPanel();
  await runEngine();
}

boot().catch(e => {
  console.error('Engine boot error:', e);
  chat.innerHTML = '<div style="padding:24px;color:var(--sub);text-align:center">'
    + '読み込みに失敗しました。<br><small>' + e.message + '</small></div>';
});
</script>
