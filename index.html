<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陪练，为了在一起</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Shippori+Mincho:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#05060e; --indigo:#11142f; --purple:#bcaaff; --purple-deep:#7c6bd6;
    --gold:#e3c485; --txt:#efedfb; --muted:#9a9fc6;
    --star:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Cpath%20d='M12%200C13.2%208.4%2015.6%2010.8%2024%2012C15.6%2013.2%2013.2%2015.6%2012%2024C10.8%2015.6%208.4%2013.2%200%2012C8.4%2010.8%2010.8%208.4%2012%200Z'%20fill='%23000'/%3E%3C/svg%3E");
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{ overflow:hidden; color:var(--txt);
    font-family:"Shippori Mincho",-apple-system,"Hiragino Mincho ProN",serif;
    background:radial-gradient(120% 80% at 30% 0%, #20204e 0%, #12132f 40%, #090a18 72%, #05060e 100%);}

  .stage{position:relative; width:100%; height:100dvh; overflow:hidden;}

  .cg{position:absolute; inset:0; background-size:cover; background-position:50% 20%;
    opacity:1; animation:cgin 1.8s ease .2s both; z-index:1;}
  @keyframes cgin{from{opacity:.3}to{opacity:1}}

  /* 3層レイン */
  .rain{position:absolute; inset:-20% 0; z-index:2; opacity:.10; pointer-events:none;
    background-image:repeating-linear-gradient(101deg, transparent 0 24px,
      rgba(200,210,255,.5) 24px 25px, transparent 25px 50px);
    background-size:auto 240px; animation:rainfall 1.2s linear infinite;}
  .rain.b{opacity:.055; background-size:auto 340px; animation-duration:1.8s;
    background-image:repeating-linear-gradient(98deg, transparent 0 36px,
      rgba(200,210,255,.4) 36px 37px, transparent 37px 74px);}
  .rain.c{opacity:.032; background-size:auto 190px; animation-duration:.85s;
    background-image:repeating-linear-gradient(103deg, transparent 0 18px,
      rgba(200,210,255,.6) 18px 19px, transparent 19px 40px);}
  @keyframes rainfall{from{background-position:0 0}to{background-position:-50px 240px}}

  .scrim{position:absolute; inset:0; z-index:3; pointer-events:none;
    background:linear-gradient(180deg, rgba(5,6,14,.88) 0%, rgba(5,6,14,.42) 26%, transparent 46%, rgba(5,6,14,.52) 80%, rgba(5,6,14,.95) 100%);}

  /* THREE.js particle canvas */
  #particles{position:absolute; top:0; left:0; width:100%; height:100%; z-index:4; pointer-events:none; opacity:0; transition:opacity 1.6s ease 1.0s;}
  #particles.ready{opacity:1;}

  .content{position:absolute; inset:0; z-index:5; display:flex; flex-direction:column;
    justify-content:space-between; align-items:center; text-align:center; padding:6.5vh 26px 6.5vh;}
  .top{display:flex; flex-direction:column; align-items:center; gap:16px;}
  .btm{display:flex; flex-direction:column; align-items:center; gap:18px;}

  .eyebrow{font-family:-apple-system,sans-serif; font-size:11px; letter-spacing:.32em;
    color:var(--gold); text-transform:uppercase; display:flex; align-items:center; gap:10px;
    opacity:0; animation:up .9s ease 1.0s forwards;}
  .eyebrow .ln{width:24px; height:1px; background:linear-gradient(90deg,transparent,var(--gold));}
  .eyebrow .ln.r{background:linear-gradient(90deg,var(--gold),transparent);}

  .titlewrap{position:relative; display:inline-block;}
  .title{font-family:"Noto Serif SC",serif; font-weight:700; line-height:1.16;
    font-size:clamp(36px,9vw,64px); letter-spacing:.04em;
    text-shadow:0 4px 34px rgba(0,0,0,.85); opacity:0; animation:up 1s ease 1.2s forwards;
    position:relative; overflow:hidden;}
  .title .accent{color:var(--purple);
    text-shadow:0 0 28px rgba(188,170,255,.5), 0 4px 30px rgba(0,0,0,.8);}
  /* タイトルシマー */
  .title::after{content:''; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(105deg, transparent 20%, rgba(255,255,255,.55) 50%, transparent 80%);
    transform:translateX(-160%) skewX(-18deg);
    animation:titshine 8s ease-in-out 3.0s infinite;}
  @keyframes titshine{
    0%{transform:translateX(-160%) skewX(-18deg);}
    18%{transform:translateX(210%) skewX(-18deg);}
    100%{transform:translateX(210%) skewX(-18deg);}
  }

  .tagline{font-family:"Shippori Mincho",serif; font-size:clamp(13px,3.7vw,16px);
    color:#e6e3f6; line-height:2.15; max-width:330px;
    text-shadow:0 2px 18px rgba(0,0,0,.95); opacity:0; animation:up 1s ease 1.55s forwards;}
  @keyframes up{from{opacity:0; transform:translateY(16px)}to{opacity:1; transform:none}}

  .markers{display:flex; align-items:center; gap:14px; opacity:0; animation:up 1s ease 1.75s forwards;}
  .chip{display:inline-flex; align-items:center; gap:7px; font-family:-apple-system,sans-serif;
    font-size:11px; letter-spacing:.12em; color:#d6d8f2;
    background:rgba(18,20,44,.5); border:1px solid rgba(150,160,220,.24);
    padding:7px 14px; border-radius:30px; backdrop-filter:blur(6px);}
  .chip b{color:var(--purple); font-weight:600;}
  .markers .sep{width:5px;height:5px;border-radius:50%;background:rgba(150,160,220,.45);}

  .cta{position:relative; opacity:0; animation:up 1s ease 2.0s forwards;}
  .cta a{display:inline-flex; align-items:center; gap:12px; cursor:pointer; text-decoration:none;
    position:relative; overflow:hidden;
    font-family:"Shippori Mincho",serif; font-size:17px; font-weight:600; letter-spacing:.08em; color:#fff;
    padding:17px 48px; border-radius:40px;
    background:linear-gradient(135deg,#8a74e6,#6f5bc8 55%,#9d7be0);
    box-shadow:0 12px 38px rgba(124,107,214,.55), inset 0 1px 0 rgba(255,255,255,.25);
    border:1px solid rgba(190,170,255,.45); transition:transform .25s, box-shadow .25s;}
  .cta a:hover{transform:translateY(-2px); box-shadow:0 20px 52px rgba(124,107,214,.75), inset 0 1px 0 rgba(255,255,255,.3);}
  .cta a .arr{font-size:14px; transition:transform .25s;}
  .cta a:hover .arr{transform:translateX(4px);}
  .cta a::before{content:""; position:absolute; top:-50%; left:0; width:50%; height:200%;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.18) 35%, rgba(255,255,255,.75) 50%, rgba(255,255,255,.18) 65%, transparent);
    transform:translateX(-220%) skewX(-22deg); pointer-events:none;
    animation:shine 5s ease-in-out 2.6s infinite;}
  @keyframes shine{
    0%{transform:translateX(-220%) skewX(-22deg);}
    17%{transform:translateX(320%) skewX(-22deg);}
    100%{transform:translateX(320%) skewX(-22deg);}
  }
  .cta::after{content:""; position:absolute; inset:-8px; border-radius:46px; z-index:-1;
    background:radial-gradient(closest-side, rgba(140,118,230,.65), transparent 70%);
    filter:blur(14px); animation:pulse 2.8s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.4; transform:scale(.97)}50%{opacity:.9; transform:scale(1.06)}}

  .hintline{font-family:-apple-system,sans-serif; font-size:11px; color:var(--muted);
    letter-spacing:.05em; opacity:0; animation:up 1s ease 2.25s forwards;}

  .vignette{position:absolute; inset:0; z-index:7; pointer-events:none;
    box-shadow:inset 0 0 170px 46px rgba(0,0,0,.62);}

  /* ===== 開発中 落款 ===== */
  .dev-seal{
    display:inline-block;
    width:34px; padding:9px 0;
    border:2px solid rgba(210,40,40,.75);
    border-radius:4px;
    font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
    font-size:11px; font-weight:700; letter-spacing:.1em;
    color:rgba(210,40,40,.75);
    text-align:center; line-height:1.7;
    transform:rotate(-8deg);
    opacity:.82;
    pointer-events:none;
    user-select:none;
  }

  /* ===== タイトル周りのキラキラ ===== */
  .sparkles{position:absolute; inset:-40px -28px; pointer-events:none; z-index:6;}
  .spk{position:absolute; width:var(--s,15px); height:var(--s,15px);
    background:var(--c,#fff);
    -webkit-mask:var(--star) center/contain no-repeat; mask:var(--star) center/contain no-repeat;
    filter:drop-shadow(0 0 5px var(--c,#fff)); opacity:0; transform:scale(.2);
    animation:twinkle var(--d,3.4s) ease-in-out var(--delay,1.6s) infinite;}
  @keyframes twinkle{
    0%,100%{opacity:0; transform:scale(.2) rotate(0deg);}
    45%{opacity:1;}
    55%{opacity:1; transform:scale(1) rotate(35deg);}
    100%{opacity:0; transform:scale(.2) rotate(60deg);}
  }

  @media (min-width:820px){
    .cta a{font-size:18px;}
  }
  @media (prefers-reduced-motion:reduce){
    .rain,.cta::after,.cta a::before,.title::after{animation:none !important;}
    .cg,.title,.tagline,.eyebrow,.markers,.cta,.hintline{animation:none !important; opacity:1 !important; transform:none !important;}
    .spk{animation:none !important;}
    #particles{display:none;}
  }
</style>
</head>
<body>
<div class="stage">
  <div class="cg" id="cg"></div>
  <script>
  (function(){
    var bgs=['IMG_2694.JPG','IMG_2695.JPG','IMG_2697.JPG','IMG_2698.JPG'];
    document.getElementById('cg').style.backgroundImage='url("'+bgs[Math.floor(Math.random()*bgs.length)]+'")';
  })();
  </script>

  <div class="rain"></div>
  <div class="rain b"></div>
  <div class="rain c"></div>
  <div class="scrim"></div>

  <canvas id="particles"></canvas>

  <div class="content">
    <div class="top">
      <div class="eyebrow"><span class="ln"></span>péiliàn, wèile zài yìqǐ<span class="ln r"></span></div>
      <div class="titlewrap">
        <h1 class="title">陪练，<br><span class="accent">为了在一起</span></h1>
        <div class="sparkles">
          <span class="spk" style="top:-4%;  left:14%; --s:18px; --c:#e3c485; --d:3.6s; --delay:1.4s;"></span>
          <span class="spk" style="top:2%;   left:60%; --s:12px; --c:#d8caff; --d:3.0s; --delay:2.3s;"></span>
          <span class="spk" style="top:-8%;  left:84%; --s:15px; --c:#fff;    --d:4.0s; --delay:1.9s;"></span>
          <span class="spk" style="top:30%;  left:-4%; --s:13px; --c:#d8caff; --d:3.3s; --delay:2.8s;"></span>
          <span class="spk" style="top:24%;  left:96%; --s:16px; --c:#e3c485; --d:3.8s; --delay:1.6s;"></span>
          <span class="spk" style="top:58%;  left:6%;  --s:11px; --c:#fff;    --d:2.8s; --delay:3.0s;"></span>
          <span class="spk" style="top:64%;  left:76%; --s:14px; --c:#d8caff; --d:3.5s; --delay:2.0s;"></span>
          <span class="spk" style="top:96%;  left:32%; --s:12px; --c:#e3c485; --d:3.2s; --delay:2.6s;"></span>
          <span class="spk" style="top:90%;  left:88%; --s:15px; --c:#fff;    --d:4.1s; --delay:1.7s;"></span>
          <span class="spk" style="top:100%; left:58%; --s:10px; --c:#d8caff; --d:3.0s; --delay:3.3s;"></span>
        </div>
      </div>
      <p class="tagline">一緒にいるために、<br>今日も少しだけ練習しよう。</p>
      <div class="dev-seal" aria-hidden="true">開<br>発<br>中</div>
    </div>
    <div class="btm">
      <div class="markers">
        <span class="chip"><b>Day 1</b></span>
        <span class="sep"></span>
        <span class="chip">🌙 深夜 23:48</span>
      </div>
      <div class="cta"><a id="start" href="prologue.html">会話を始める<span class="arr">▸</span></a></div>
      <div class="hintline">タップすると、あの夜の朗読ルームから物語が始まります</div>
    </div>
  </div>

  <div class="vignette"></div>
</div>

<script src="three.min.js"></script>
<script>
// ===== THREE.js パーティクル =====
(function(){
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  var canvas = document.getElementById('particles');
  var W = window.innerWidth, H = window.innerHeight;

  var scene = new THREE.Scene();
  var cam = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 0.1, 10);
  cam.position.z = 5;

  var renderer = new THREE.WebGLRenderer({canvas: canvas, alpha: true, antialias: false});
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);

  var N = W > 600 ? 38 : 22;
  var positions = new Float32Array(N * 3);
  var colors = new Float32Array(N * 3);
  var velocities = [];

  var gold   = new THREE.Color(0xe3c485);
  var purple = new THREE.Color(0xbcaaff);

  for(var i = 0; i < N; i++){
    positions[i*3]   = (Math.random() - 0.5) * W;
    positions[i*3+1] = (Math.random() - 0.5) * H;
    positions[i*3+2] = 0;
    var c = Math.random() < 0.55 ? gold : purple;
    colors[i*3]   = c.r;
    colors[i*3+1] = c.g;
    colors[i*3+2] = c.b;
    velocities.push({
      vx:    (Math.random() - 0.5) * 0.20,
      vy:    (Math.random() - 0.5) * 0.13 - 0.05,
      phase: Math.random() * Math.PI * 2,
      amp:   Math.random() * 0.09 + 0.03
    });
  }

  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

  var mat = new THREE.PointsMaterial({
    size:          2.8,
    vertexColors:  true,
    blending:      THREE.AdditiveBlending,
    transparent:   true,
    opacity:       0.50,
    sizeAttenuation: false,
    depthWrite:    false
  });

  scene.add(new THREE.Points(geo, mat));

  var t = 0;
  function loop(){
    requestAnimationFrame(loop);
    t++;
    for(var i = 0; i < N; i++){
      var v = velocities[i];
      positions[i*3]   += v.vx + Math.sin(t * 0.012 + v.phase) * v.amp;
      positions[i*3+1] += v.vy + Math.cos(t * 0.009 + v.phase) * v.amp * 0.5;
      if(positions[i*3]   >  W/2) positions[i*3]   = -W/2;
      if(positions[i*3]   < -W/2) positions[i*3]   =  W/2;
      if(positions[i*3+1] >  H/2) positions[i*3+1] = -H/2;
      if(positions[i*3+1] < -H/2) positions[i*3+1] =  H/2;
    }
    geo.attributes.position.needsUpdate = true;
    renderer.render(scene, cam);
  }
  loop();
  canvas.classList.add('ready');
})();

// ===== スタートボタン =====
document.getElementById('start').addEventListener('click', function(e){
  e.preventDefault();
  var hasSave = !!localStorage.getItem('luca_data');
  location.href = hasSave ? 'chat.html' : 'liveroom.html';
});
</script>
</body>
</html>
