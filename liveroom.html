<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>雨夜朗读会 ── 朗読ルームの夜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080a18;
    --panel:#10132a;
    --panel2:#161a36;
    --line:rgba(150,160,210,.12);
    --txt:#e9eaf6;
    --muted:#8a8fb6;
    --gold:#e3c485;        /* 配信者カラー */
    --gold-bg:rgba(227,196,133,.10);
    --luca:#bcaaff;        /* 陸カラー */
    --luca-bg:rgba(124,107,214,.20);
    --luca-bd:rgba(160,144,255,.45);
    --me:#9b8be6;
    --booth:url("assets/images/liveroom-booth.jpg");
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #1a1c3e 0%, #0a0c1e 55%, #06070f 100%);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;
    color:var(--txt);
    display:flex; align-items:center; justify-content:center;
    min-height:100dvh; padding:14px;
  }

  /* ===== スマホ枠 ===== */
  .phone{
    width:100%; max-width:412px; height:min(880px,94dvh);
    background:var(--bg); border-radius:38px;
    border:1px solid rgba(170,180,230,.14);
    box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 0 8px #05060d, inset 0 0 0 1px rgba(255,255,255,.03);
    overflow:hidden; position:relative; display:flex; flex-direction:column;
  }

  /* ===== ヘッダー ===== */
  .statusbar{display:flex; justify-content:space-between; align-items:center;
    padding:12px 22px 4px; font-size:13px; color:#cfd2ee; font-weight:600;}
  .statusbar .ico{letter-spacing:2px; font-size:11px;}
  .topbar{display:flex; align-items:center; gap:10px; padding:6px 16px 8px;}
  .topbar .nav{font-size:20px; color:#cfd2ee; width:24px;}
  .room-h{flex:1; min-width:0;}
  .room-title{display:flex; align-items:center; gap:8px;}
  .room-title h1{font-family:"Shippori Mincho",serif; font-size:18px; margin:0; font-weight:600; letter-spacing:.5px;}
  .badge-live{display:inline-flex; align-items:center; gap:5px; background:rgba(255,90,110,.16);
    color:#ff8a9b; font-size:10px; font-weight:700; padding:3px 8px; border-radius:20px; white-space:nowrap;}
  .dot{width:6px;height:6px;border-radius:50%;background:#ff5a6e;animation:blink 1.4s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .room-sub{display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted); margin-top:3px;}
  .topbar .acts{display:flex; gap:14px; font-size:16px; color:#aab0d6;}
  .meta2{display:flex; align-items:center; gap:6px; padding:0 16px 8px; font-size:11px; color:var(--muted);}
  .follow{margin-left:auto; background:linear-gradient(135deg,#7c6bd6,#9d7be0); color:#fff;
    border:none; font-size:11px; font-weight:700; padding:6px 12px; border-radius:20px;}
  .hot{color:#ffb86b;}

  /* ===== 放送画面（メインビジュアル） ===== */
  .stage{position:relative; height:228px; flex:none; overflow:hidden;
    border-bottom:1px solid var(--line);}
  .stage .bgimg{position:absolute; inset:0; background-image:var(--booth);
    background-size:cover; background-position:center 38%;
    animation:breathe 18s ease-in-out infinite; filter:saturate(.9);}
  @keyframes breathe{0%,100%{transform:scale(1.02)}50%{transform:scale(1.1)}}
  .stage .veil{position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(8,10,24,.35) 0%, rgba(8,10,24,.15) 40%, rgba(8,10,24,.78) 100%);}

  /* 朗読者アイコン＋音の演出 */
  .host-wrap{position:absolute; left:0; right:0; top:34px; display:flex; flex-direction:column; align-items:center;}
  .host-rings{position:relative; width:84px; height:84px; display:flex; align-items:center; justify-content:center;}
  .ring{position:absolute; border:1.5px solid rgba(227,196,133,.5); border-radius:50%; inset:0; opacity:0;
    animation:ring 2.6s ease-out infinite;}
  .ring:nth-child(2){animation-delay:.9s;}
  .ring:nth-child(3){animation-delay:1.8s;}
  @keyframes ring{0%{transform:scale(.55);opacity:.7}100%{transform:scale(1.7);opacity:0}}
  .host-av{width:62px;height:62px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #4a4170, #211b3c);
    border:2px solid rgba(227,196,133,.75); display:flex;align-items:center;justify-content:center;
    font-size:26px; box-shadow:0 0 22px rgba(227,196,133,.35);}
  .live-on{margin-top:9px; display:inline-flex; align-items:center; gap:6px;
    background:rgba(10,12,28,.55); border:1px solid rgba(227,196,133,.3);
    padding:3px 10px; border-radius:20px; font-size:10px; color:var(--gold); font-weight:700;}
  .eq{display:inline-flex; align-items:flex-end; gap:2px; height:11px;}
  .eq i{width:2.5px; background:var(--gold); border-radius:2px; animation:eq .9s ease-in-out infinite;}
  .eq i:nth-child(1){height:5px;animation-delay:0s} .eq i:nth-child(2){height:11px;animation-delay:.15s}
  .eq i:nth-child(3){height:7px;animation-delay:.3s} .eq i:nth-child(4){height:10px;animation-delay:.45s}
  @keyframes eq{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}

  .plate{position:absolute; left:18px; bottom:58px; max-width:62%;}
  .plate p{font-family:"Shippori Mincho",serif; margin:0; font-size:13px; line-height:1.7;
    color:#e6dcc4; text-shadow:0 2px 10px rgba(0,0,0,.7);}
  .nowreading{position:absolute; left:16px; right:16px; bottom:14px;}
  .nowreading .nr-t{display:flex; justify-content:space-between; align-items:baseline; font-size:11px; margin-bottom:6px;}
  .nowreading .nr-t b{font-family:"Shippori Mincho",serif; color:#eee4cf; font-weight:600;}
  .nowreading .nr-t small{color:var(--muted);}
  .bar{height:3px; background:rgba(255,255,255,.16); border-radius:3px; overflow:hidden;}
  .bar>i{display:block; height:100%; width:14%; background:linear-gradient(90deg,#e3c485,#caa45f);
    border-radius:3px; animation:prog 150s linear forwards;}
  @keyframes prog{from{width:14%}to{width:88%}}

  /* ===== チャット欄 ===== */
  .chat{flex:1; display:flex; flex-direction:column; min-height:0; background:
    linear-gradient(180deg,#0a0c1e,#080a16);}

  /* 主播セリフ固定枠（一番上） */
  .host-pin{flex:none; margin:10px 12px 4px; padding:10px 12px; border-radius:14px;
    background:var(--gold-bg); border:1px solid rgba(227,196,133,.28);
    box-shadow:0 4px 18px rgba(0,0,0,.25); position:relative; transition:opacity .4s;}
  .host-pin .hp-name{display:flex; align-items:center; gap:7px; font-size:11px; color:var(--gold); font-weight:700; margin-bottom:4px;}
  .host-pin .hp-name .tag{background:rgba(227,196,133,.18); padding:1px 6px; border-radius:5px; font-size:9px;}
  .host-pin .hp-text{font-size:16px; color:#f2ead7; line-height:1.5; min-height:22px; cursor:pointer;}
  .host-pin .hp-text.zh{font-family:"Noto Sans SC",sans-serif;}
  .host-pin .hp-time{position:absolute; right:12px; top:11px; font-size:10px; color:var(--muted);}

  .feed-label{padding:6px 16px 2px; font-size:10px; color:#6f74a0; letter-spacing:1px;}
  .feed{flex:1; overflow-y:auto; padding:2px 12px 10px; display:flex; flex-direction:column; gap:8px;}
  .feed::-webkit-scrollbar{width:0;}

  .cmt{display:flex; gap:9px; align-items:flex-start; animation:rise .45s ease;}
  @keyframes rise{from{opacity:0; transform:translateY(8px)}to{opacity:1;transform:none}}
  .cmt.fade{animation:fadeout 1.2s ease forwards;}
  @keyframes fadeout{to{opacity:.28}}
  .av{width:30px;height:30px;border-radius:50%; flex:none; font-size:13px; font-weight:700;
    display:flex;align-items:center;justify-content:center; color:#fff;}
  .cmt .body{min-width:0;}
  .cmt .nm{font-size:11px; color:#9aa0c8; margin-bottom:2px; display:flex; gap:6px; align-items:center;}
  .cmt .nm small{color:#5e638c; font-size:9.5px;}
  .cmt .tx{font-size:13.5px; color:#c9cce6; line-height:1.5;}
  .cmt .tx.zh{font-family:"Noto Sans SC",sans-serif;}

  /* 陸の特別コメント */
  .cmt.luca .av{background:radial-gradient(circle at 35% 30%,#5a4f86,#2a2447);
    border:1.5px solid var(--luca-bd); overflow:hidden;}
  .cmt.luca .av img{width:100%;height:100%;object-fit:cover;}
  .cmt.luca .nm{color:var(--luca); font-weight:700;}
  .cmt.luca .bubble{background:var(--luca-bg); border:1px solid var(--luca-bd);
    border-radius:4px 14px 14px 14px; padding:9px 12px; display:inline-block;
    box-shadow:0 4px 16px rgba(124,107,214,.18); cursor:pointer;}
  .cmt.luca .tx{color:#ece8ff; font-size:15px; font-family:"Noto Sans SC",sans-serif;}

  /* タップヒント（指マーク） */
  .hint{display:inline-flex; align-items:center; gap:6px; margin-top:6px;
    font-size:10.5px; color:#cdbcff; background:rgba(124,107,214,.16);
    border:1px solid var(--luca-bd); padding:4px 9px; border-radius:20px; animation:bob 1.4s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

  /* ===== 入力バー ===== */
  .inputbar{flex:none; display:flex; align-items:center; gap:10px; padding:10px 14px 16px;
    border-top:1px solid var(--line); background:rgba(8,10,22,.9);}
  .inputbar .field{flex:1; background:#181b32; border:1px solid var(--line); border-radius:22px;
    padding:9px 14px; font-size:13px; color:var(--muted);}
  .inputbar .ib{font-size:19px; color:#aab0d6;}
  .heart{display:flex; flex-direction:column; align-items:center; color:#ff7b91; font-size:18px;}
  .heart small{font-size:9px; color:var(--muted);}

  /* ===== ナレーション（地の文）オーバーレイ ===== */
  .narr{position:absolute; inset:0; background:rgba(5,6,14,.86); backdrop-filter:blur(3px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:36px 30px; z-index:40; opacity:0; pointer-events:none; transition:opacity .6s;}
  .narr.show{opacity:1; pointer-events:auto;}
  .narr p{font-family:"Shippori Mincho",serif; font-size:16px; line-height:2.1; color:#d9dcf2;
    text-align:left; white-space:pre-line; overflow-wrap:anywhere; margin:0; width:100%; max-width:340px;}
  .narr .tapnext{position:absolute; bottom:34px; font-size:11px; color:#7e83ad; letter-spacing:1px;
    animation:blink 1.6s infinite;}

  /* ===== 学習ポップアップ ===== */
  .pop-mask{position:absolute; inset:0; background:rgba(4,5,12,.6); z-index:60; display:none;
    align-items:center; justify-content:center; padding:24px;}
  .pop-mask.show{display:flex;}
  .pop{background:linear-gradient(180deg,#1a1d3a,#13152c); border:1px solid var(--luca-bd);
    border-radius:18px; padding:22px 22px 18px; width:100%; max-width:320px;
    box-shadow:0 24px 60px rgba(0,0,0,.6); animation:rise .35s ease;}
  .pop .zh{font-family:"Noto Sans SC",sans-serif; font-size:26px; color:#fff; letter-spacing:1px;}
  .pop .py{font-size:14px; color:var(--gold); margin-top:8px;}
  .pop .ja{font-size:14px; color:#c5c9e6; margin-top:10px; line-height:1.6;}
  .pop .close{margin-top:16px; text-align:center; font-size:12px; color:var(--luca);
    border:1px solid var(--luca-bd); border-radius:20px; padding:8px; background:rgba(124,107,214,.12);}

  /* ===== 退室ボタン／本編への橋渡し ===== */
  .exit{position:absolute; left:0; right:0; bottom:0; z-index:50; padding:18px 18px 26px;
    background:linear-gradient(0deg,#06070f 60%,transparent); display:none; flex-direction:column; gap:10px;}
  .exit.show{display:flex; animation:rise .5s ease;}
  .exit .leave{font-family:"Shippori Mincho",serif; text-align:center; font-size:13px; color:#cdbcff;
    background:rgba(124,107,214,.14); border:1px solid var(--luca-bd); border-radius:24px; padding:14px;}
  .end-card{position:absolute; inset:0; z-index:70; background:rgba(5,6,14,.94);
    display:none; flex-direction:column; align-items:center; justify-content:center; padding:34px; text-align:center;}
  .end-card.show{display:flex; animation:fadein .8s ease;}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .end-card .moon{font-size:34px; margin-bottom:18px; opacity:.8;}
  .end-card p{font-family:"Shippori Mincho",serif; font-size:15px; line-height:2; color:#dadcf2; margin:0 0 26px; white-space:pre-line;}
  .end-card .go{background:linear-gradient(135deg,#7c6bd6,#a07be0); color:#fff; border:none;
    font-size:14px; font-weight:700; padding:14px 34px; border-radius:26px; box-shadow:0 10px 30px rgba(124,107,214,.4);}

  /* ===== 陸とのDM ===== */
  .dm-ov{position:absolute; inset:0; z-index:80; display:none; flex-direction:column;
    background:linear-gradient(180deg,rgba(26,21,48,.50),rgba(13,10,28,.74)),url("assets/images/bg.jpg") center/cover no-repeat;}
  .dm-ov.show{display:flex; animation:fadein .45s ease;}
  .dm-hd{display:flex; align-items:center; gap:10px; padding:14px 14px 12px;
    background:rgba(20,16,40,.65); border-bottom:1px solid var(--line); backdrop-filter:blur(8px);}
  .dm-back{color:#aab0d6; font-size:24px; line-height:1; text-decoration:none;}
  .dm-av{width:44px; height:44px; flex:none; border-radius:50%;
    background:#1a1530; position:relative; overflow:hidden;
    border:2px solid var(--luca-bd); box-shadow:0 0 18px rgba(124,107,214,.25);}
  .dm-av::before{content:''; position:absolute; inset:-10%;
    background:url("assets/images/luca-face-default.png") center 15%/cover;}
  .dm-nm{font-size:15px; font-weight:700;} .dm-st{margin-top:2px; color:#63da8a; font-size:10px;}
  .dm-chat{flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; gap:13px;
    padding:16px 14px 22px; scrollbar-width:none;}
  .dm-chat::-webkit-scrollbar{display:none;}
  .dm-row{display:flex; align-items:flex-end; gap:8px; animation:rise .3s ease;}
  .dm-row.me{flex-direction:row-reverse;}
  .dm-mini{width:30px; height:30px; flex:none; border-radius:50%;
    background:#1a1530; position:relative; overflow:hidden; border:1px solid var(--luca-bd);}
  .dm-mini::before{content:''; position:absolute; inset:-10%;
    background:url("assets/images/luca-face-default.png") center 15%/cover;}
  .dm-wrap{max-width:76%; min-width:0;} .dm-row.me .dm-wrap{text-align:right;}
  .dm-bubble{display:inline-block; max-width:100%; padding:10px 13px; border-radius:16px 16px 16px 5px;
    color:#eceeff; background:#2a2342; line-height:1.55; text-align:left; overflow-wrap:anywhere;}
  .dm-row.me .dm-bubble{border-radius:16px 16px 5px 16px; background:#6d5cc4; color:#fff;}
  .dm-bubble.learn{cursor:pointer; position:relative;}
  .dm-bubble.learn::after{content:"訳"; position:absolute; right:8px; bottom:6px; font-size:9px;
    color:#a89fce; border:1px solid rgba(255,255,255,.08); border-radius:6px; padding:0 4px; opacity:.7;}
  .dm-bubble.open.learn::after{content:"✕";}
  .dm-trans{display:none; margin-top:7px; padding-top:7px;
    border-top:1px dashed rgba(188,170,255,.22); color:#aeb3d5; font-size:12px;}
  .dm-bubble.open .dm-trans{display:block;} .dm-py{margin-bottom:3px; color:#b9a7ff;}
  .dm-audio-btn{margin-left:8px;background:none;border:none;cursor:pointer;font-size:13px;
    vertical-align:middle;opacity:.65;padding:0 2px;}
  .dm-audio-btn:hover{opacity:1;}
  .dm-narr{align-self:center; width:min(100%,340px); padding:16px; border:1px solid rgba(227,196,133,.22);
    border-radius:16px; background:rgba(8,10,24,.78); color:#d9dcf2; line-height:1.9;
    white-space:pre-line; overflow-wrap:anywhere;}
  .dm-narr button{display:block; width:100%; margin-top:12px; padding:7px; border:0;
    color:var(--gold); background:none; font-size:11px;}
  .dm-typing .dm-bubble{padding:13px 16px;}
  .dm-typing i{display:inline-block; width:6px; height:6px; margin:0 2px; border-radius:50%;
    background:#a89fce; animation:blink 1.1s infinite;}
  .dm-typing i:nth-child(2){animation-delay:.2s}.dm-typing i:nth-child(3){animation-delay:.4s}
  .dm-choices{display:flex; flex-direction:column; gap:8px; padding:10px 12px calc(14px + env(safe-area-inset-bottom));
    background:rgba(8,10,24,.9); border-top:1px solid var(--line);}
  .dm-choices[hidden]{display:none;} .dm-prompt{text-align:center; color:var(--muted); font-size:11px;}
  .dm-choice{width:100%; padding:12px 14px; border:1px solid rgba(185,167,255,.22); border-radius:14px;
    color:var(--txt); background:rgba(185,167,255,.10); text-align:left;
    font-size:15px; font-family:inherit; cursor:pointer; transition:background .15s, transform .1s;}
  .dm-choice:hover{background:rgba(185,167,255,.20);}
  .dm-choice:active{transform:scale(.98);}
  .dm-choice small{margin-left:6px; color:#a89fce; font-size:12px;}
  .dm-stamp{align-self:center; padding:4px 12px; border:1px solid var(--luca-bd); border-radius:99px;
    color:var(--luca); background:rgba(124,107,214,.1); font-size:11px;}
  .dm-blackout{position:absolute; inset:0; z-index:90; pointer-events:none; opacity:0;
    background:#000; transition:opacity .5s;}
  .dm-blackout.show{opacity:1;}
  @media(max-width:439px){
    body{padding:0}.phone{height:100dvh; max-height:none; border:0; border-radius:0; box-shadow:none;}
    .stage{height:218px}.meta2{font-size:10px}.follow{padding:5px 9px}
  }
</style>
</head>
<body>
<div class="phone">

  <!-- ステータスバー -->
  <div class="statusbar"><span>23:48</span><span class="ico">●●●  📶  🔋</span></div>

  <!-- ヘッダー -->
  <div class="topbar">
    <div class="nav">‹</div>
    <div class="room-h">
      <div class="room-title">
        <h1>雨夜朗读会</h1>
        <span class="badge-live"><span class="dot"></span>直播中</span>
      </div>
      <div class="room-sub">CV 蓝郎（ランラン）</div>
    </div>
    <div class="acts"><span>⤴</span><span>⋯</span></div>
  </div>
  <div class="meta2">
    <span>👤 36人が視聴中</span><span class="hot">🔥 人気ラジオTOP20</span>
    <button class="follow">＋ フォロー</button>
  </div>

  <!-- 放送画面 -->
  <div class="stage">
    <div class="bgimg"></div>
    <div class="veil"></div>
    <div class="host-wrap">
      <div class="host-rings">
        <span class="ring"></span><span class="ring"></span><span class="ring"></span>
        <div class="host-av">🎙️</div>
      </div>
      <div class="live-on">
        <span class="eq"><i></i><i></i><i></i><i></i></span> 朗読中・音声ON
      </div>
    </div>
    <div class="plate"><p>今夜は、<br>静かに聞いてください。</p></div>
    <div class="nowreading">
      <div class="nr-t"><b>NOW READING　《深夜の習慣》</b><small>02:34 / 18:45</small></div>
      <div class="bar"><i></i></div>
    </div>
  </div>

  <!-- チャット -->
  <div class="chat">
    <!-- 主播セリフ固定枠（一番上） -->
    <div class="host-pin" id="hostPin" style="opacity:0;">
      <div class="hp-name"><span class="tag">配信者</span> CV 蓝郎</div>
      <div class="hp-text zh" id="hostText"></div>
      <div class="hp-time" id="hostTime"></div>
    </div>
    <div class="feed-label">─ リスナーのコメント ─</div>
    <div class="feed" id="feed"></div>
  </div>

  <!-- 入力バー -->
  <div class="inputbar">
    <span class="ib">＋</span>
    <div class="field">メッセージを入力…</div>
    <span class="ib">🎁</span>
    <div class="heart">❤️<small>126</small></div>
  </div>

  <!-- ナレーション -->
  <div class="narr" id="narr"><p id="narrText"></p><div class="tapnext">タップで続ける ▸</div></div>

  <!-- 退室ボタン -->
  <div class="exit" id="exit"><div class="leave">そっと部屋を出る ▸</div></div>

  <!-- 学習ポップアップ -->
  <div class="pop-mask" id="popMask">
    <div class="pop">
      <div class="zh" id="popZh"></div>
      <div class="py" id="popPy"></div>
      <div class="ja" id="popJa"></div>
      <div class="close" id="popClose">閉じる</div>
    </div>
  </div>

  <!-- 本編への橋渡し -->
  <div class="end-card" id="endCard">
    <div class="moon">🌙</div>
    <p>部屋を出ても、心臓はまだ走っていた。
彼のアイコンを見つけて、指が止まる。
……お礼くらい、言ってもいいよね。</p>
    <button class="go" id="goDM">お礼のDMを送る ▸</button>
  </div>

  <div class="dm-ov" id="dmOv">
    <header class="dm-hd">
      <a class="dm-back" href="index.html">‹</a>
      <div class="dm-av"></div>
      <div><div class="dm-nm">陸（ルー）</div><div class="dm-st">● オンライン</div></div>
    </header>
    <div class="dm-chat" id="dmChat"></div>
    <div class="dm-choices" id="dmChoices" hidden></div>
    <div class="dm-blackout" id="dmBlackout"></div>
  </div>

</div>

<script>
const LUCA_IMG = "assets/images/luca-portrait.jpg";
var luAudioManifest = {};
var luCurrentAudio = null;
var luCurrentBtn = null;

fetch('assets/audio/lu_audio_manifest.json')
  .then(function(r){ return r.json(); })
  .then(function(data){ luAudioManifest = data; })
  .catch(function(){});

function stopLuAudio(){
  if(luCurrentAudio){ luCurrentAudio.pause(); luCurrentAudio.currentTime=0; }
  if(luCurrentBtn) luCurrentBtn.textContent='🔊';
  luCurrentAudio=null;
  luCurrentBtn=null;
}
function playLuAudio(zh, btn){
  if(luCurrentAudio && !luCurrentAudio.paused){
    var sameButton=luCurrentBtn===btn;
    stopLuAudio();
    if(sameButton) return;
  }
  var filename = luAudioManifest[zh];
  if(!filename) return;
  luCurrentAudio = new Audio('assets/audio/' + filename);
  luCurrentBtn = btn;
  btn.textContent = '⏹';
  luCurrentAudio.play().catch(function(){
    btn.textContent='🔊';
    if(luCurrentBtn===btn){ luCurrentAudio=null; luCurrentBtn=null; }
  });
  luCurrentAudio.addEventListener('ended', function(){
    btn.textContent = '🔊';
    if(luCurrentBtn === btn){ luCurrentAudio=null; luCurrentBtn=null; }
  });
}

/* ===== 参加者（アンビエント）コメントのプール ===== */
const AMBIENT = [
  {nm:"听书少女", zh:"来了来了～🌙"},
  {nm:"星河入梦", zh:"晚上好～"},
  {nm:"书页间",   zh:"今天好多人！"},
  {nm:"风轻云淡", zh:"是新人吗？欢迎～"},
  {nm:"夜航灯",   zh:"主播声音好好听"},
  {nm:"月色温柔", zh:"准时蹲守～"},
  {nm:"南风知我", zh:"今天读什么呀"},
  {nm:"半盏茶",   zh:"哈喽大家好"},
];
const AV_COLORS = ["#6d6aa8","#8a6f9e","#5f7aa0","#9e7f6d","#6f9e8a","#a06d8a","#7d6da0","#6da09e"];

/* ===== プロローグ脚本（朗読ルーム部分） ===== */
const STEPS = [
  {t:"narr", text:"眠れない夜だった。\n中国のドラマを観て、真似して声に出して、\nいつの間にか中国語をかじり始めて――\n\n気づけば指が滑って、知らない部屋に入っていた。\n知らない人たちが、順番に何かを朗読している。"},
  {t:"ambient", n:3, ms:700},
  {t:"host", zh:"下一位～", py:"xià yī wèi～", ja:"次の人～", ms:900},
  {t:"narr", text:"――順番が、回ってきた。\n何か言わなきゃ。でも、言葉が出ない。\n心臓だけが、うるさい。"},
  {t:"pause", ms:1600},
  {t:"host", zh:"咋了？网不好？", py:"zǎ le? wǎng bù hǎo?", ja:"どした？ ネット悪い？", ms:1100},
  {t:"narr", text:"答えなきゃ。でも、やっぱり出てこない。\n沈黙が、こわい。"},
  {t:"pause", ms:1000},
  {t:"luca", zh:"别紧张。", py:"bié jǐnzhāng.", ja:"緊張しないで。", ms:1200, hint:"中国語をタップ → ピンインと日本語が出るよ"},
  {t:"luca", zh:"没事，慢慢来，慢慢习惯了就好了。", py:"méi shì, màn man lái, màn man xíguàn le jiù hǎo le.", ja:"大丈夫。ゆっくりでいい。だんだん慣れていけばいいから。", ms:1800},
  {t:"luca", zh:"让她先听吧。", py:"ràng tā xiān tīng ba.", ja:"この子は、まず聞くだけにしてやれ。", ms:1400},
  {t:"host", zh:"行～那下一位！", py:"xíng～ nà xià yī wèi!", ja:"おっけー～じゃ次の人！", ms:1200},
  {t:"narr", text:"誰も笑わなかった。\n彼が、そういう空気にしてくれたから。\n\n……そっと、部屋を出た。\nでも、あの声が、まだ耳に残っていた。"},
  {t:"end"},
];

/* data/prologue.json の location:"dm" 以降 */
const DM_STEPS = [
  {type:"scene",location:"dm"},
  {type:"narration",text:"部屋を出ても、心臓はまだ走っていた。\n彼のアイコンを見つけて、指が止まる。\n……お礼くらい、言ってもいいよね。"},
  {type:"choice",prompt:"はじめのDM、なんて送る？",options:[
    {send:{zh:"谢谢你刚才帮我。",pinyin:"xièxie nǐ gāngcái bāng wǒ.",ja:"さっきは助けてくれてありがとう。"},love:3,
      reply:[{type:"line",speaker:"陸",lang:"zh",zh:"嗯。没什么。",pinyin:"ng. méi shénme.",ja:"ん。大したことじゃない。"}]},
    {send:{zh:"谢谢…我太紧张了。",pinyin:"xièxie… wǒ tài jǐnzhāng le.",ja:"ありがとう…緊張しすぎちゃって。"},love:3,
      reply:[{type:"line",speaker:"陸",lang:"zh",zh:"看出来了。……别紧张了，都过去了。",pinyin:"kàn chūlái le. … bié jǐnzhāng le, dōu guòqù le.",ja:"見てればわかる。……もう緊張すんな、終わったことだ。"}]},
    {send:{zh:"不好意思，打扰了。谢谢你。",pinyin:"bù hǎoyìsi, dǎrǎo le. xièxie nǐ.",ja:"ごめんなさい、お邪魔して。ありがとう。"},love:3,
      reply:[{type:"line",speaker:"陸",lang:"zh",zh:"没打扰。",pinyin:"méi dǎrǎo.",ja:"邪魔なんかじゃない。"}]}
  ]},
  {type:"line",speaker:"陸",lang:"zh",zh:"你……不是中国人吧？",pinyin:"nǐ… bùshì zhōngguó rén ba?",ja:"きみ……中国人じゃないだろ？"},
  {type:"line",speaker:"主人公",lang:"ja",ja:"そうです！"},
  {type:"line",speaker:"主人公",lang:"ja",ja:"ありがとうございます！本当に助かりました！"},
  {type:"line",speaker:"陸",lang:"zh",zh:"……我不懂日语。",pinyin:"wǒ bù dǒng rìyǔ.",ja:"……日本語は、わからない。"},
  {type:"line",speaker:"陸",lang:"zh",zh:"用中文。慢慢写就行。",pinyin:"yòng zhōngwén. màn man xiě jiù xíng.",ja:"中国語で。ゆっくり書けばいい。"},
  {type:"narration",text:"――この人とは、日本語に逃げられない。\nでも、それって。\n（“逃げ道がない”って、練習には、一番いいんじゃ……？）"},
  {type:"choice",prompt:"本題、どう切り出す？",options:[
    {send:{zh:"那个…我可以拜托你一件事吗？",pinyin:"nàge… wǒ kěyǐ bàituō nǐ yí jiàn shì ma?",ja:"あの…ひとつお願いしてもいい？"},love:3,reply:[]},
    {send:{zh:"我在学中文。一个人学。",pinyin:"wǒ zài xué zhōngwén. yí ge rén xué.",ja:"中国語、勉強してるの。ひとりで。"},love:3,reply:[]},
    {send:{zh:"你能不能……当我的练习对象？",pinyin:"nǐ néng bù néng… dāng wǒ de liànxí duìxiàng?",ja:"あなた…わたしの練習相手に、なってくれない？"},love:4,reply:[]}
  ]},
  {type:"line",speaker:"主人公",lang:"zh",zh:"每天晚上，陪我练习中文，好不好？",pinyin:"měitiān wǎnshang, péi wǒ liànxí zhōngwén, hǎo bù hǎo?",ja:"毎晩、中国語の練習に付き合ってくれない？"},
  {type:"effect",name:"hesitation"},
  {type:"pause",ms:1500},
  {type:"line",speaker:"陸",lang:"zh",zh:"每天？",pinyin:"měitiān?",ja:"毎日？"},
  {type:"line",speaker:"主人公",lang:"zh",zh:"嗯。每天。",pinyin:"ng. měitiān.",ja:"うん。毎日。"},
  {type:"pause",ms:1500},
  {type:"line",speaker:"陸",lang:"zh",zh:"……练习而已。",pinyin:"liànxí éryǐ.",ja:"……ただの、練習だろ。"},
  {type:"narration",text:"――練習なら。恋じゃないなら。きっと、大丈夫だ。\n（彼がそう自分に言い聞かせたことに、このときの彼女は気づかない。）"},
  {type:"line",speaker:"陸",lang:"zh",zh:"行。",pinyin:"xíng.",ja:"いいよ。"},
  {type:"line",speaker:"陸",lang:"zh",zh:"但是——别迟到。来了就好好练。",pinyin:"dànshì— bié chídào. lái le jiù hǎohǎo liàn.",ja:"ただし――遅刻すんな。来たなら、ちゃんと練習しろ。"},
  {type:"line",speaker:"陸",lang:"zh",zh:"慢慢来。习惯了，就不难了。",pinyin:"màn man lái. xíguàn le, jiù bù nán le.",ja:"ゆっくりでいい。慣れれば、難しくない。"},
  {type:"narration",text:"こうして、毎晩の“練習”が始まった。\n――まだ、ただの練習だったころの話。"},
  {type:"effect",name:"blackout"},
  {type:"effect",name:"datestamp"},
  {type:"end",next:"episode1"}
];

/* ===== 要素 ===== */
const feed = document.getElementById('feed');
const hostPin = document.getElementById('hostPin');
const hostText = document.getElementById('hostText');
const hostTime = document.getElementById('hostTime');
const narr = document.getElementById('narr');
const narrText = document.getElementById('narrText');
const exitBox = document.getElementById('exit');
const endCard = document.getElementById('endCard');

let idx = 0;
let ambientTimer = null;
let waitingTap = false;

/* 学習ポップアップ */
function openPop(zh,py,ja){
  document.getElementById('popZh').textContent = zh;
  document.getElementById('popPy').textContent = py;
  document.getElementById('popJa').textContent = ja;
  document.getElementById('popMask').classList.add('show');
}
document.getElementById('popClose').onclick = ()=>document.getElementById('popMask').classList.remove('show');
document.getElementById('popMask').onclick = (e)=>{ if(e.target.id==='popMask') document.getElementById('popMask').classList.remove('show'); };

/* アンビエントコメントを1件流す */
let avi = 0;
function spawnAmbient(){
  const c = AMBIENT[Math.floor(Math.random()*AMBIENT.length)];
  const color = AV_COLORS[avi++ % AV_COLORS.length];
  const el = document.createElement('div');
  el.className = 'cmt';
  el.innerHTML = `
    <div class="av" style="background:${color}">${c.nm[0]}</div>
    <div class="body">
      <div class="nm">${c.nm} <small>23:4${Math.floor(Math.random()*9)}</small></div>
      <div class="tx zh">${c.zh}</div>
    </div>`;
  feed.appendChild(el);
  feed.scrollTop = feed.scrollHeight;
  // 古いアンビエントは薄くフェード
  const ambients = feed.querySelectorAll('.cmt:not(.luca)');
  if(ambients.length>6) ambients[0].remove();
  setTimeout(()=>el.classList.add('fade'), 4000);
}
function startAmbient(){ if(!ambientTimer) ambientTimer=setInterval(spawnAmbient, 2600); }

/* 主播の固定枠を更新 */
function setHost(step){
  hostPin.style.opacity = 1;
  hostText.textContent = step.zh;
  hostTime.textContent = '23:4'+(5+Math.floor(Math.random()*4));
  hostText.onclick = ()=>openPop(step.zh, step.py, step.ja);
}

/* 陸のコメントを流す */
function addLuca(step){
  const el = document.createElement('div');
  el.className = 'cmt luca';
  el.innerHTML = `
    <div class="av"><img src="${LUCA_IMG}" alt="陸"></div>
    <div class="body">
      <div class="nm">陸 <small>23:46</small></div>
      <div class="bubble"><div class="tx zh">${step.zh}</div></div>
      ${step.hint ? `<div class="hint">👆 ${step.hint}</div>` : ''}
    </div>`;
  feed.appendChild(el);
  feed.scrollTop = feed.scrollHeight;
  el.querySelector('.bubble').onclick = ()=>{
    openPop(step.zh, step.py, step.ja);
    const h = el.querySelector('.hint'); if(h) h.remove();
  };
}

/* ナレーション表示（タップ待ち） */
function showNarr(text){
  narrText.textContent = text;
  narr.classList.add('show');
  waitingTap = true;
}

/* 次のステップへ */
function next(){
  if(idx >= STEPS.length) return;
  const step = STEPS[idx++];
  switch(step.t){
    case 'narr':
      showNarr(step.text); // タップで次へ
      break;
    case 'host':
      setHost(step);
      setTimeout(next, step.ms||1000);
      break;
    case 'luca':
      addLuca(step);
      setTimeout(next, step.ms||1200);
      break;
    case 'ambient':
      for(let i=0;i<(step.n||2);i++) setTimeout(spawnAmbient, i*450);
      startAmbient();
      setTimeout(next, step.ms||800);
      break;
    case 'pause':
      setTimeout(next, step.ms||1000);
      break;
    case 'end':
      clearInterval(ambientTimer);
      exitBox.classList.add('show');
      break;
  }
}

/* ナレーションのタップ送り */
narr.addEventListener('click', ()=>{
  if(!waitingTap) return;
  waitingTap = false;
  narr.classList.remove('show');
  setTimeout(next, 350);
});

/* 退室 → 本編へ */
exitBox.addEventListener('click', ()=>{
  exitBox.classList.remove('show');
  endCard.classList.add('show');
});

/* ===== DMシーン ===== */
const dmOv = document.getElementById('dmOv');
const dmChat = document.getElementById('dmChat');
const dmChoices = document.getElementById('dmChoices');
const dmBlackout = document.getElementById('dmBlackout');
let dmLove = 0;
const wait = ms => new Promise(resolve=>setTimeout(resolve,ms));
function dmScroll(){ dmChat.scrollTop = dmChat.scrollHeight; }
function dmBubble(step){
  const row=document.createElement('div');
  const isMe=step.speaker==='主人公';
  row.className='dm-row'+(isMe?' me':'');
  if(!isMe){ const mini=document.createElement('div'); mini.className='dm-mini'; row.appendChild(mini); }
  const wrap=document.createElement('div'); wrap.className='dm-wrap';
  const bubble=document.createElement('div');
  if(step.lang==='zh'&&step.zh){
    bubble.className='dm-bubble learn';
    const zh=document.createElement('div'); zh.textContent=step.zh;
    if(!isMe){
      var audioBtn=document.createElement('button');
      audioBtn.className='dm-audio-btn';
      audioBtn.textContent='🔊';
      audioBtn.setAttribute('aria-label','音声を再生');
      audioBtn.addEventListener('click',function(e){
        e.stopPropagation();
        playLuAudio(step.zh,audioBtn);
      });
      zh.appendChild(audioBtn);
    }
    const trans=document.createElement('div'); trans.className='dm-trans';
    const py=document.createElement('div'); py.className='dm-py'; py.textContent=step.pinyin||'';
    trans.appendChild(py); trans.appendChild(document.createTextNode(step.ja||''));
    bubble.append(zh,trans);
    bubble.addEventListener('click',()=>bubble.classList.toggle('open'));
  }else{
    bubble.className='dm-bubble'; bubble.textContent=step.ja||step.zh||'';
  }
  wrap.appendChild(bubble); row.appendChild(wrap); return row;
}
function dmAddLine(step){ dmChat.appendChild(dmBubble(step)); dmScroll(); }
function dmTyping(ms=650){
  const row=document.createElement('div'); row.className='dm-row dm-typing';
  const mini=document.createElement('div'); mini.className='dm-mini';
  const bubble=document.createElement('div'); bubble.className='dm-bubble';
  bubble.innerHTML='<i></i><i></i><i></i>'; row.append(mini,bubble); dmChat.appendChild(row); dmScroll();
  return wait(ms).then(()=>row.remove());
}
function dmNarration(text){
  return new Promise(resolve=>{
    const card=document.createElement('div'); card.className='dm-narr'; card.textContent=text;
    const nextButton=document.createElement('button'); nextButton.textContent='タップして続ける ▾';
    card.appendChild(nextButton); dmChat.appendChild(card); dmScroll();
    nextButton.addEventListener('click',()=>{ nextButton.remove(); resolve(); },{once:true});
  });
}
function dmChoose(step){
  return new Promise(resolve=>{
    dmChoices.hidden=false; dmChoices.replaceChildren();
    const prompt=document.createElement('div'); prompt.className='dm-prompt'; prompt.textContent=step.prompt||'なんて送る？';
    dmChoices.appendChild(prompt);
    step.options.forEach(option=>{
      const button=document.createElement('button'); button.className='dm-choice'; button.textContent=option.send.zh;
      const gloss=document.createElement('small'); gloss.textContent=option.send.ja; button.appendChild(gloss);
      button.addEventListener('click',async()=>{
        dmChoices.hidden=true; dmChoices.replaceChildren();
        dmAddLine({type:'line',speaker:'主人公',lang:'zh',...option.send});
        dmLove += Number(option.love)||0;
        for(const reply of option.reply||[]){ await dmTyping(600); dmAddLine(reply); await wait(300); }
        resolve();
      },{once:true});
      dmChoices.appendChild(button);
    });
  });
}
async function dmEffect(step){
  if(step.name==='hesitation'){ await dmTyping(550); await wait(250); await dmTyping(550); }
  if(step.name==='blackout'){
    dmBlackout.classList.add('show'); await wait(900); dmBlackout.classList.remove('show'); await wait(500);
  }
  if(step.name==='datestamp'){
    const stamp=document.createElement('div'); stamp.className='dm-stamp';
    stamp.textContent='— 毎晩の練習、はじまりの日 —'; dmChat.appendChild(stamp); dmScroll(); await wait(900);
  }
}
function makeUserId(){
  if(window.crypto&&crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=Math.random()*16|0; return (c==='x'?r:(r&3|8)).toString(16);
  });
}
function savePrologueData(){
  const data={
    userId:makeUserId(),
    createdAt:new Date().toISOString(),
    progress:{currentEpId:'episode1',completedEps:['prologue']},
    affection:{love:dmLove,level:1},
    words:[],giftLog:[],voiceLogs:[]
  };
  localStorage.setItem('luca_data',JSON.stringify(data));
}
async function runDM(){
  for(const step of DM_STEPS){
    if(step.type==='scene'){ dmOv.classList.add('show'); }
    else if(step.type==='narration'){ await dmNarration(step.text); await wait(250); }
    else if(step.type==='line'){
      if(step.speaker==='陸') await dmTyping(600);
      dmAddLine(step); await wait(320);
    }
    else if(step.type==='choice'){ await dmChoose(step); }
    else if(step.type==='effect'){ await dmEffect(step); }
    else if(step.type==='pause'){ await wait(step.ms||0); }
    else if(step.type==='end'){ savePrologueData(); window.location.href='chat.html'; return; }
  }
}
document.getElementById('goDM').addEventListener('click',()=>{
  dmOv.classList.add('show');
  endCard.classList.remove('show');
  dmChat.replaceChildren();
  dmLove=0;
  runDM();
},{once:true});

/* 開始 */
window.addEventListener('load', ()=> setTimeout(next, 600));
</script>
</body>
