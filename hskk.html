<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>秘密の発音練習部屋｜陸</title>
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<style>
  :root{--bg-top:#1a1530;--bg-bottom:#0d0a1c;--panel:#2a2342;--accent:#b9a7ff;
    --heart:#ff8db5;--text:#efeaff;--sub:#a89fce;--line:rgba(255,255,255,.09);--good:#7dde9a;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{min-height:100dvh;background:#000;color:var(--text);display:flex;justify-content:center;align-items:center;
    font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP","PingFang SC",sans-serif}
  button{font:inherit}
  .phone{width:100%;max-width:420px;height:100vh;height:100dvh;max-height:880px;display:flex;flex-direction:column;
    overflow:hidden;position:relative;background:linear-gradient(180deg,rgba(26,21,48,.62),rgba(13,10,28,.82)),
    url("assets/images/bg.jpg") center/cover;box-shadow:0 0 60px rgba(110,80,200,.25)}
  @media(min-width:440px){.phone{height:92dvh;border-radius:28px}}
  header{display:flex;align-items:center;gap:10px;padding:calc(12px + env(safe-area-inset-top)) 14px 11px;
    background:rgba(20,16,40,.76);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .back{color:var(--sub);font-size:26px;text-decoration:none;line-height:1;padding:4px}
  .avatar{width:42px;height:42px;border-radius:50%;flex:none;background:url("assets/images/luca-face-default.png") center 15%/cover;
    box-shadow:0 0 0 2px rgba(185,167,255,.42)}
  .head-text{min-width:0;flex:1}.head-name{font-weight:700;font-size:15px}.head-title{color:var(--accent);font-size:11px;margin-top:2px}
  .levels{display:flex;gap:6px;padding:9px 14px;background:rgba(15,11,30,.62);border-bottom:1px solid var(--line)}
  .level{padding:5px 10px;border-radius:99px;font-size:11px;color:var(--sub);border:1px solid var(--line)}
  .level.active{color:var(--accent);border-color:rgba(185,167,255,.4);background:rgba(185,167,255,.13)}
  .level.disabled{opacity:.4}
  .content{flex:1;overflow-y:auto;padding:13px 14px calc(18px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:12px}
  .content::-webkit-scrollbar{width:0}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .stat{padding:9px 11px;border-radius:12px;background:rgba(30,23,58,.74);border:1px solid rgba(185,167,255,.18)}
  .stat-label{font-size:10px;color:var(--sub)}.stat-value{margin-top:2px;font-size:16px;font-weight:700;color:var(--accent)}
  .question{padding:17px;border-radius:18px;background:rgba(30,23,58,.9);border:1px solid rgba(185,167,255,.25);
    box-shadow:0 12px 30px rgba(0,0,0,.25)}
  .question-no{font-size:11px;color:var(--accent);letter-spacing:.12em}.prompt-label{margin-top:12px;font-size:11px;color:var(--sub)}
  .question-zh{margin-top:5px;font-size:22px;line-height:1.5;font-weight:700}.question-ja{margin-top:7px;color:var(--sub);font-size:13px;line-height:1.55}
  .hints{display:flex;flex-wrap:wrap;gap:6px;margin-top:13px}.hint{padding:5px 9px;border-radius:9px;background:rgba(185,167,255,.1);
    color:var(--accent);font-size:12px;border:1px solid rgba(185,167,255,.18)}
  .state{min-height:38px;padding:9px 11px;border-radius:11px;background:rgba(8,6,18,.36);border:1px solid var(--line);
    color:var(--sub);font-size:12px;line-height:1.55}
  .state[data-state="playing"],.state[data-state="judging"]{color:#ffd27d}.state[data-state="recording"]{color:var(--heart)}
  .state[data-state="success"]{color:var(--good)}.state[data-state="failure"]{color:#ffbd82}
  .record-meter{display:none;padding:8px 10px;border-radius:11px;background:rgba(255,141,181,.1);border:1px solid rgba(255,141,181,.22)}
  .record-meter.show{display:block}.record-meter-top{display:flex;justify-content:space-between;gap:10px;color:#ffc2d8;font-size:11px}
  .record-track{height:6px;margin-top:7px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden}
  .record-fill{height:100%;width:100%;border-radius:inherit;background:linear-gradient(90deg,#ff8db5,#b9a7ff);transition:width .16s linear}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .action{min-height:43px;border-radius:12px;border:1px solid rgba(185,167,255,.28);background:rgba(185,167,255,.12);
    color:var(--text);cursor:pointer;padding:8px 4px;font-size:12px;white-space:nowrap}
  .action.primary{background:#6d5cc4;border-color:#7e6ed0}.action.stop{background:rgba(255,141,181,.22);color:#ffc2d8}
  .action:disabled{opacity:.42;cursor:not-allowed}.action:active:not(:disabled){transform:scale(.98)}
  .heard,.feedback{display:none;padding:14px;border-radius:15px;background:rgba(30,23,58,.82);border:1px solid rgba(185,167,255,.2)}
  .heard.show,.feedback.show{display:block}.section-title{font-size:11px;color:var(--accent);margin-bottom:7px}
  .heard-text{font-size:16px;line-height:1.55}.feedback p{margin:0 0 8px;font-size:13px;line-height:1.65}
  .feedback p:last-child{margin-bottom:0}.model{padding-top:8px;border-top:1px dashed var(--line);color:var(--text)}
  .model-ja{display:block;color:var(--sub);font-size:11px;margin-top:3px}
  .suggestion{margin-top:10px;padding:12px;border-radius:13px;background:rgba(185,167,255,.1);border:1px solid rgba(185,167,255,.2)}
  .suggestion-zh{font-size:17px;line-height:1.55;font-weight:700}.suggestion-py{margin-top:5px;color:var(--accent);font-size:13px;line-height:1.55}
  .suggestion-ja{margin-top:4px;color:var(--sub);font-size:12px;line-height:1.5}.suggestion-src{margin-top:7px;color:rgba(168,159,206,.78);font-size:10px}
  .say-btn{width:100%;margin-top:11px;min-height:40px;border-radius:10px;border:1px solid rgba(185,167,255,.3);
    background:#6d5cc4;color:#fff;cursor:pointer}.say-btn:disabled{opacity:.45;cursor:not-allowed}
  .fallback{display:none;padding:10px;border-radius:11px;background:rgba(255,190,120,.1);border:1px solid rgba(255,190,120,.25);
    color:var(--sub);font-size:11px;line-height:1.6}.fallback.show{display:block}
  .loading{padding:24px;color:var(--sub);text-align:center}
</style>
</head>
<body>
<main class="phone">
  <header>
    <a class="back" href="chat.html" aria-label="トークルームへ戻る">‹</a>
    <div class="avatar" aria-hidden="true"></div>
    <div class="head-text"><div class="head-name">陸（ルー）</div><div class="head-title">秘密の発音練習部屋</div></div>
  </header>
  <div class="levels" aria-label="練習レベル">
    <span class="level active">HSKK 初級</span><span class="level disabled">中級</span><span class="level disabled">自由練習</span>
  </div>
  <section class="content" id="content">
    <div class="loading" id="loading">練習問題を読み込み中…</div>
    <div class="stats" id="stats" hidden>
      <div class="stat"><div class="stat-label">今日練習した回数</div><div class="stat-value" id="todayCount">0回</div></div>
      <div class="stat"><div class="stat-label">この部屋で言えた回数</div><div class="stat-value" id="totalCount">0回</div></div>
    </div>
    <article class="question" id="questionCard" hidden>
      <div class="question-no" id="questionNo">题目 01</div>
      <div class="prompt-label">请用中文回答：</div>
      <div class="question-zh" id="questionZh"></div>
      <div class="question-ja" id="questionJa"></div>
      <div class="hints" id="hints"></div>
    </article>
    <div class="fallback" id="audioFallback">音が出ない時は、中国語のお手本を読んで、ピンインなしでも自分のペースで練習できます。</div>
    <div class="state" id="state" data-state="idle" role="status">未開始：お手本を聞くか、録音して答えてください。</div>
    <div class="record-meter" id="recordMeter" aria-live="polite">
      <div class="record-meter-top"><span id="recordMeterLabel">録音中</span><span id="recordCountdown">10.0秒</span></div>
      <div class="record-track"><div class="record-fill" id="recordFill"></div></div>
    </div>
    <div class="actions" id="actions" hidden>
      <button class="action" id="modelBtn">▶ お手本を聞く</button>
      <button class="action primary" id="recordBtn">🎙 録音して答える</button>
      <button class="action" id="retryBtn" disabled>🔁 もう一度試す</button>
      <button class="action" id="nextBtn">⏭ 次の問題</button>
      <a class="action" href="chat.html" style="grid-column:1/-1;text-align:center;text-decoration:none;padding-top:12px">💬 通常チャットへ戻る</a>
    </div>
    <section class="heard" id="heard"><div class="section-title">聞き取れた内容</div><div class="heard-text" id="heardText"></div></section>
    <section class="feedback" id="feedback"><div class="section-title" id="feedbackTitle">フィードバック</div><div id="feedbackBody"></div></section>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.26.0/dist/index.min.js"></script>
<script>
(function(){
  'use strict';
  var questions=[],questionIndex=0,manifest={},audio=null,audioButton=null,activeRecognition=null;
  var Recognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  var speechSupported=('speechSynthesis' in window)&&('SpeechSynthesisUtterance' in window);
  var stateEl=document.getElementById('state'),recordBtn=document.getElementById('recordBtn');
  var ANSWER_WINDOW_MS=10000;
  var recordMode='answer',practiceTarget=null,lastTemplate={praise:'',lead:'',retry:''},resultToken=0;
  var recordTimer=null,recordTick=null,recordStartedAt=0,pendingNoSpeech=false;
  var LU_TEMPLATES={
    praise:['お、言えてる','いい音だ','悪くない、その調子','ちゃんと届いたぞ'],
    lead:['お前の言い方、こう直すと自然だ。言ってみ','じゃあ、こう言ってみろ','ついでに、これも覚えとけ'],
    retry:['惜しい、もう一回','焦んなくていい、ゆっくり','もう一度だけ、いけるか']
  };

  function makeUuid(){
    if(window.crypto&&crypto.randomUUID) return crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
      var r=Math.random()*16|0,v=c==='x'?r:(r&3|8);return v.toString(16);
    });
  }
  function loadData(){
    var data;
    try{data=JSON.parse(localStorage.getItem('luca_data')||'null');}catch(e){data=null;}
    if(!data||typeof data!=='object') data={userId:makeUuid(),createdAt:new Date().toISOString()};
    if(!data.progress) data.progress={currentEpId:'episode1',currentIdx:0,completedEps:['prologue']};
    if(!data.affection) data.affection={love:0,level:1};
    ['words','giftLog','voiceLogs','awards','choices'].forEach(function(key){if(!Array.isArray(data[key])) data[key]=[];});
    return data;
  }
  var appData=loadData();
  function save(){try{localStorage.setItem('luca_data',JSON.stringify(appData));}catch(e){}}
  function localDay(ts){return new Date(ts).toLocaleDateString('sv-SE');}
  function updateStats(){
    var logs=appData.voiceLogs.filter(function(log){return log&&log.source==='hskk';});
    var today=new Date().toLocaleDateString('sv-SE');
    document.getElementById('todayCount').textContent=logs.filter(function(log){return log.ts&&localDay(log.ts)===today;}).length+'回';
    document.getElementById('totalCount').textContent=logs.length+'回';
  }
  function setState(state,text){stateEl.dataset.state=state;stateEl.textContent=text;}
  function pickTemplate(kind){
    var list=LU_TEMPLATES[kind],pool=list.filter(function(text){return text!==lastTemplate[kind];});
    var text=(pool.length?pool:list)[Math.floor(Math.random()*(pool.length?pool.length:list.length))];
    lastTemplate[kind]=text;return text;
  }
  function stopAudio(){
    if(audio){audio.pause();audio.currentTime=0;audio=null;}
    if(speechSupported) try{speechSynthesis.cancel();}catch(e){}
    if(audioButton){audioButton.textContent='▶ お手本を聞く';audioButton=null;}
  }
  function showAudioFallback(){
    document.getElementById('audioFallback').classList.add('show');
  }
  function speak(text){
    if(!speechSupported){showAudioFallback();return Promise.resolve(false);}
    try{
      speechSynthesis.cancel();
      var utterance=new SpeechSynthesisUtterance(text);utterance.lang='zh-CN';utterance.rate=.9;
      speechSynthesis.speak(utterance);return Promise.resolve(true);
    }catch(e){showAudioFallback();return Promise.resolve(false);}
  }
  function playModel(){
    var question=questions[questionIndex],filename=manifest[question.model];
    if(audio||audioButton){stopAudio();setState('idle','お手本を停止しました。');return;}
    audioButton=document.getElementById('modelBtn');audioButton.textContent='🛑 停止';
    setState('playing','お手本再生中…');
    if(filename){
      audio=new Audio('assets/audio/'+filename);
      audio.addEventListener('ended',function(){stopAudio();setState('idle','お手本を聞き終わりました。声に出してみて。');});
      audio.play().catch(function(){audio=null;speak(question.model).then(finishModel);});
    }else speak(question.model).then(finishModel);
  }
  function finishModel(started){
    if(!started) showAudioFallback();
    setTimeout(function(){stopAudio();setState('idle',started?'お手本を聞き終わりました。声に出してみて。':'中国語のお手本を読んで練習できます。');},1200);
  }
  function releaseActiveRecognition(){
    if(!activeRecognition)return;
    stopRecordMeter();
    var rec=activeRecognition;activeRecognition=null;rec._stoppedByUser=true;
    try{rec.abort();}catch(e){}try{rec.stop();}catch(e){}
  }
  window.addEventListener('pagehide',releaseActiveRecognition);
  window.addEventListener('beforeunload',releaseActiveRecognition);
  document.addEventListener('visibilitychange',function(){if(document.visibilityState==='hidden')releaseActiveRecognition();});

  function resetRecordButton(){
    recordBtn.textContent=recordMode==='practice'?'🎙 言ってみる':'🎙 録音して答える';recordBtn.classList.remove('stop');
  }
  function stopRecordMeter(){
    if(recordTimer){clearTimeout(recordTimer);recordTimer=null;}
    if(recordTick){clearInterval(recordTick);recordTick=null;}
    document.getElementById('recordMeter').classList.remove('show');
  }
  function updateRecordMeter(){
    var elapsed=Date.now()-recordStartedAt;
    var remain=Math.max(0,ANSWER_WINDOW_MS-elapsed);
    document.getElementById('recordCountdown').textContent=(remain/1000).toFixed(1)+'秒';
    document.getElementById('recordFill').style.width=(remain/ANSWER_WINDOW_MS*100)+'%';
  }
  function startRecordWindow(recognition){
    stopRecordMeter();
    pendingNoSpeech=false;
    recordStartedAt=Date.now();
    document.getElementById('recordMeterLabel').textContent=recordMode==='practice'?'言ってみる時間':'答える時間';
    document.getElementById('recordMeter').classList.add('show');
    updateRecordMeter();
    recordTick=setInterval(updateRecordMeter,100);
    recordTimer=setTimeout(function(){
      recognition._timedStop=true;
      try{recognition.stop();}catch(e){}
      stopRecordMeter();
    },ANSWER_WINDOW_MS);
  }
  function showMicFailure(message){
    setState('failure',message);
    document.getElementById('retryBtn').disabled=false;
  }
  function startRecording(mode){
    if(mode)recordMode=mode;
    if(recordMode==='practice')resultToken++;
    if(activeRecognition){activeRecognition._stoppedByUser=true;stopRecordMeter();try{activeRecognition.stop();}catch(e){}return;}
    if(!Recognition){
      showMicFailure('マイクが使えない時は、お手本を聞いて次へ進めます。');
      return;
    }
    stopAudio();
    var recognition=new Recognition();recognition.lang='zh-CN';recognition.interimResults=false;recognition.maxAlternatives=1;
    recognition.continuous=true;
    recognition._hasOutcome=false;recognition._restartAfterEnd=false;activeRecognition=recognition;
    recordBtn.textContent='🛑 停止';recordBtn.classList.add('stop');
    setState('recording',recordMode==='practice'?'録音中：提案文を声に出して。':'録音中：話し終わったら停止を押してください。');
    recognition.onstart=function(){console.log('[HSKK] recognition start');if(!recordTimer)startRecordWindow(recognition);};
    recognition.onaudiostart=function(){console.log('[HSKK] audio start');};
    recognition.onspeechstart=function(){console.log('[HSKK] speech start');};
    recognition.onspeechend=function(){console.log('[HSKK] speech end');};
    recognition.onresult=function(event){
      console.log('[HSKK] result',event.results);
      recognition._hasOutcome=true;
      stopRecordMeter();
      var resultIndex=event.resultIndex||0;
      var text=(event.results[resultIndex][0].transcript||'').trim();
      setState('judging','判定中：聞き取れた内容を確認しています…');
      if(recordMode==='practice')showPracticeResult(text);
      else showResult(text);
    };
    recognition.onerror=function(event){
      console.warn('[HSKK] recognition error:',event.error,event);
      if(event.error==='no-speech'&&!recognition._timedStop){
        pendingNoSpeech=true;
        recognition._restartAfterEnd=true;
        setState('recording','まだ聞いています。残り時間で、ゆっくり話して。');
        return;
      }
      recognition._hasOutcome=true;
      stopRecordMeter();
      if(recordMode==='practice'&&event.error!=='not-allowed'){showPracticeResult('');return;}
      showMicFailure(event.error==='not-allowed'
        ?'マイクが使えない時は、お手本を聞いて次へ進めます。'
        :'今回はうまく聞き取れませんでした。もう一度試す？');
    };
    recognition.onnomatch=function(){
      recognition._hasOutcome=true;
      stopRecordMeter();
      if(recordMode==='practice'){showPracticeResult('');return;}
      showMicFailure('今回はうまく聞き取れませんでした。もう一度試す？');
    };
    recognition.onend=function(){
      var stoppedByUser=!!recognition._stoppedByUser,hasOutcome=!!recognition._hasOutcome;
      console.log('[HSKK] recognition end',{stoppedByUser:stoppedByUser,hasOutcome:hasOutcome});
      if(recognition._restartAfterEnd&&!hasOutcome&&!stoppedByUser&&!recognition._timedStop&&
          Date.now()-recordStartedAt<ANSWER_WINDOW_MS-250){
        recognition._restartAfterEnd=false;
        activeRecognition=recognition;
        try{recognition.start();return;}catch(e){
          recognition._hasOutcome=true;
          if(activeRecognition===recognition)activeRecognition=null;
          stopRecordMeter();resetRecordButton();
          if(recordMode==='practice')showPracticeResult('');
          else showMicFailure('今回はうまく聞き取れませんでした。もう一度試す？');
          return;
        }
      }
      if(activeRecognition===recognition)activeRecognition=null;
      stopRecordMeter();
      resetRecordButton();
      if(!hasOutcome&&recognition._timedStop){
        recognition._hasOutcome=true;
        if(recordMode==='practice')showPracticeResult('');
        else showMicFailure(pendingNoSpeech?'今回はうまく聞き取れませんでした。もう一度試す？':'10秒たちました。聞き取れなかったら、もう一度で大丈夫。');
        return;
      }
      if(recognition._stoppedByUser&&!recognition._hasOutcome)setState('idle','録音を停止しました。もう一度試して大丈夫です。');
    };
    try{recognition.start();}catch(e){
      if(activeRecognition===recognition)activeRecognition=null;
      stopRecordMeter();
      resetRecordButton();showMicFailure('録音を開始できませんでした。お手本を聞いて次へ進めます。');
    }
  }
  function templateFeedback(question,text){
    practiceTarget={zh:question.model,ja:question.model_ja,source:'お手本'};
    return '<p>'+escapeHtml(pickTemplate('praise'))+'</p><p>'+escapeHtml(pickTemplate('lead'))+'</p>'+
      suggestionHtml(practiceTarget);
  }
  function escapeHtml(value){
    var div=document.createElement('div');div.textContent=String(value||'');return div.innerHTML;
  }
  function pinyinFor(text){
    var api=window.pinyinPro||window.pinyin;
    try{
      if(window.pinyinPro&&typeof window.pinyinPro.pinyin==='function')return window.pinyinPro.pinyin(text,{toneType:'symbol',type:'array'}).join(' ');
      if(typeof api==='function')return api(text,{toneType:'symbol',type:'array'}).join(' ');
    }catch(e){}
    return '';
  }
  function suggestionHtml(target){
    return '<div class="suggestion" id="suggestionBox">'+
      '<div class="suggestion-zh" id="suggestionZh">'+escapeHtml(target.zh)+'</div>'+
      '<div class="suggestion-py" id="suggestionPy">'+escapeHtml(pinyinFor(target.zh)||'pinyin 読み込み中…')+'</div>'+
      (target.ja?'<div class="suggestion-ja" id="suggestionJa">'+escapeHtml(target.ja)+'</div>':'')+
      '<div class="suggestion-src" id="suggestionSrc">'+escapeHtml(target.source||'お手本')+'</div>'+
      '<button class="say-btn" id="practiceBtn" type="button">🎤 言ってみる</button>'+
    '</div>';
  }
  function refreshSuggestion(target){
    practiceTarget=target;
    var zh=document.getElementById('suggestionZh'),py=document.getElementById('suggestionPy');
    var ja=document.getElementById('suggestionJa'),src=document.getElementById('suggestionSrc');
    if(zh)zh.textContent=target.zh;
    if(py)py.textContent=pinyinFor(target.zh)||'';
    if(ja)ja.textContent=target.ja||'';else if(target.ja){
      var node=document.createElement('div');node.className='suggestion-ja';node.id='suggestionJa';node.textContent=target.ja;
      var box=document.getElementById('suggestionBox');if(box)box.insertBefore(node,src);
    }
    if(src)src.textContent=target.source||'AI提案';
  }
  function bindPracticeButton(){
    var btn=document.getElementById('practiceBtn');
    if(btn)btn.addEventListener('click',function(){startRecording('practice');});
  }
  function withTimeout(promise,ms){
    var timer;
    return Promise.race([
      promise,
      new Promise(function(_,reject){timer=setTimeout(function(){reject(new Error('timeout'));},ms);})
    ]).finally(function(){clearTimeout(timer);});
  }
  function extractChineseSentence(value){
    var text=String(value||'').replace(/[「」『』"']/g,'').split(/\n/)[0].trim();
    var match=text.match(/[\u3400-\u9fff][\u3400-\u9fff，。！？、；：“”‘’（）…\s0-9A-Za-z]+/);
    if(!match)return '';
    var sentence=match[0].replace(/\s+/g,'').replace(/[。！？].*$/,'$&');
    return /[\u3400-\u9fff]{2,}/.test(sentence)?sentence:'';
  }
  async function nanoRephrase(question,text){
    var LM=window.LanguageModel;
    if(!LM||typeof LM.create!=='function')return null;
    var session=null;
    try{
      if(typeof LM.availability==='function'){
        var availability=await withTimeout(LM.availability(),2500);
        if(availability==='unavailable'||availability==='no')return null;
      }
      var systemPrompt='あなたは中国語ネイティブの陸。ユーザーが言おうとした中文を、意味を保ったまま自然な口語の中文1文に直す。返答は中文1文だけ。説明や日本語は書かない。';
      try{
        session=await withTimeout(LM.create({
          systemPrompt:systemPrompt,
          expectedInputs:[{type:'text',languages:['ja']}],
          expectedOutputs:[{type:'text',languages:['ja']}]
        }),3000);
      }catch(e){
        session=await withTimeout(LM.create({
          systemPrompt:systemPrompt,
          expectedOutputs:[{type:'text',languages:['ja']}]
        }),3000);
      }
      var answer=await withTimeout(session.prompt('元の発話：'+text+'\n自然な中文に直して、中文1文だけ返す。'),3000);
      var zh=extractChineseSentence(answer);
      if(!zh)return null;
      return {zh:zh,ja:'',source:'AI提案'};
    }catch(e){return null;}
    finally{if(session&&session.destroy)try{session.destroy();}catch(e){}}
  }
  async function showResult(text){
    var token=++resultToken,question=questions[questionIndex];
    if(!isSubstantiveAnswer(text)){
      document.getElementById('heard').classList.remove('show');
      document.getElementById('feedback').classList.remove('show');
      document.getElementById('retryBtn').disabled=false;
      setState('failure','ん、聞こえなかった。もう一回いいか？');
      recordMode='answer';resetRecordButton();
      return;
    }
    document.getElementById('heardText').textContent=text||'（聞き取り結果なし）';
    document.getElementById('heard').classList.add('show');
    document.getElementById('feedback').classList.add('show');
    document.getElementById('feedbackTitle').textContent='往復練習';
    document.getElementById('feedbackBody').innerHTML=templateFeedback(question,text);
    bindPracticeButton();
    setState('success','聞き取れました。声に出せた、それで十分。');
    document.getElementById('retryBtn').disabled=false;
    appData.voiceLogs.push({ts:new Date().toISOString(),source:'hskk',roomId:'hskk_basic',
      questionId:question.id,phase:'answer',zh:question.zh,recognized:text,score:null});
    save();updateStats();
    var ai=text?await nanoRephrase(question,text):null;
    if(ai&&token===resultToken)refreshSuggestion(ai);
  }
  function isSubstantiveAnswer(text){
    return String(text||'').replace(/[\s\u3000、。，．！？!?…・「」『』"'“”‘’（）()]/g,'').length>0;
  }
  function normalizeZh(text){
    return String(text||'').replace(/[，。！？、；：“”‘’（）\s,.!?;:'"()\[\]{}]/g,'').toLowerCase();
  }
  function looseScore(recognized,target){
    var a=normalizeZh(recognized),b=normalizeZh(target);
    if(!a||!b)return 0;
    var hits=0,used={};
    for(var i=0;i<b.length;i++){
      for(var j=0;j<a.length;j++){
        if(!used[j]&&b[i]===a[j]){used[j]=true;hits++;break;}
      }
    }
    return hits/Math.max(a.length,b.length);
  }
  function showPracticeResult(text){
    var target=practiceTarget||{zh:questions[questionIndex].model,source:'お手本'};
    var ok=!!text&&(looseScore(text,target.zh)>=0.6||normalizeZh(text).length>=2);
    document.getElementById('heardText').textContent=text||'（聞き取り結果なし）';
    document.getElementById('heard').classList.add('show');
    document.getElementById('feedback').classList.add('show');
    document.getElementById('feedbackTitle').textContent='言ってみた結果';
    document.getElementById('feedbackBody').innerHTML=ok
      ? '<p>'+escapeHtml(pickTemplate('praise'))+'</p><p class="model">練習した文：'+escapeHtml(target.zh)+'<span class="model-ja">'+escapeHtml(pinyinFor(target.zh))+'</span></p>'
      : '<p>'+escapeHtml(pickTemplate('retry'))+'</p>'+suggestionHtml(target);
    if(!ok)bindPracticeButton();
    setState(ok?'success':'failure',ok?'ちゃんと声に出せた。今日はそれで十分。':'惜しい。もう一回だけ、ゆっくり。');
    appData.voiceLogs.push({ts:new Date().toISOString(),source:'hskk',roomId:'hskk_basic',
      questionId:questions[questionIndex].id,phase:'practice',zh:target.zh,recognized:text,score:Math.round(looseScore(text,target.zh)*100)});
    save();updateStats();
    recordMode='answer';resetRecordButton();
  }
  function renderQuestion(){
    var q=questions[questionIndex];
    releaseActiveRecognition();stopAudio();resetRecordButton();
    document.getElementById('questionNo').textContent='题目 '+String(questionIndex+1).padStart(2,'0');
    document.getElementById('questionZh').textContent=q.zh;
    document.getElementById('questionJa').textContent='（日本語）'+q.ja;
    var hints=document.getElementById('hints');hints.innerHTML='';
    q.hints.forEach(function(text){var chip=document.createElement('span');chip.className='hint';chip.textContent=text;hints.appendChild(chip);});
    document.getElementById('heard').classList.remove('show');
    document.getElementById('feedback').classList.remove('show');
    document.getElementById('retryBtn').disabled=true;
    recordMode='answer';practiceTarget=null;resultToken++;
    setState('idle','未開始：お手本を聞くか、録音して答えてください。');
    document.getElementById('nextBtn').textContent=questionIndex===questions.length-1?'⏭ 最初の問題へ':'⏭ 次の問題';
  }
  function bootstrap(){
    Promise.all([
      fetch('data/hskk.json').then(function(r){if(!r.ok)throw new Error('hskk');return r.json();}),
      fetch('assets/audio/lu_audio_manifest.json').then(function(r){return r.ok?r.json():{};}).catch(function(){return {};})
    ]).then(function(values){
      questions=values[0].rooms[0].questions;manifest=values[1]||{};
      document.getElementById('loading').hidden=true;
      document.getElementById('stats').hidden=false;
      document.getElementById('questionCard').hidden=false;
      document.getElementById('actions').hidden=false;
      if(!speechSupported)showAudioFallback();
      updateStats();renderQuestion();
      if(!Recognition){
        recordBtn.disabled=true;
        recordBtn.textContent='🎙 マイク非対応';
        showMicFailure('マイクが使えない時は、お手本を聞いて次へ進めます。');
      }
    }).catch(function(){
      document.getElementById('loading').textContent='練習問題を読み込めませんでした。通常チャットへ戻って、もう一度開いてください。';
    });
  }
  document.getElementById('modelBtn').addEventListener('click',playModel);
  recordBtn.addEventListener('click',function(){startRecording('answer');});
  document.getElementById('retryBtn').addEventListener('click',function(){startRecording('answer');});
  document.getElementById('nextBtn').addEventListener('click',function(){questionIndex=(questionIndex+1)%questions.length;renderQuestion();});
  bootstrap();
})();
</script>
